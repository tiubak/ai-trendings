<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Tagline Creator - 2026-02-10</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Raleway', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            padding: 20px;
            color: #e0e0e0;
        }

        .container {
            max-width: 950px;
            margin: 0 auto;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            text-align: center;
            color: #00d4ff;
            margin-bottom: 8px;
            font-size: 2.5rem;
            text-shadow: 0 2px 15px rgba(0, 212, 255, 0.5);
        }

        .subtitle {
            text-align: center;
            color: #9d4edd;
            margin-bottom: 40px;
            font-size: 1.2rem;
        }

        .mode-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
        }

        .mode-tab {
            flex: 1;
            padding: 14px;
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(0, 212, 255, 0.3);
            border-radius: 12px;
            color: #00d4ff;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s;
            font-weight: 600;
        }

        .mode-tab.active {
            background: rgba(0, 212, 255, 0.2);
            border-color: #00d4ff;
        }

        .mode-tab:hover:not(.active) {
            background: rgba(0, 212, 255, 0.1);
            border-color: rgba(0, 212, 255, 0.5);
        }

        .control-panel {
            background: rgba(25, 25, 45, 0.95);
            border-radius: 16px;
            padding: 28px;
            margin-bottom: 32px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(0, 212, 255, 0.1);
        }

        .section {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #00d4ff;
        }

        input[type="text"], select, textarea {
            width: 100%;
            padding: 12px;
            background: rgba(35, 35, 60, 0.8);
            border: 2px solid rgba(0, 212, 255, 0.3);
            border-radius: 10px;
            font-size: 1rem;
            color: #e0e0e0;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #00d4ff;
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.3);
        }

        select {
            cursor: pointer;
        }

        .row {
            display: flex;
            gap: 16px;
        }

        .row .section {
            flex: 1;
        }

        .keyword-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 8px;
        }

        .chip {
            background: rgba(0, 212, 255, 0.2);
            color: #00d4ff;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .chip:hover {
            background: rgba(0, 212, 255, 0.4);
        }

        .chip.selected {
            background: #00d4ff;
            color: #0f0c29;
        }

        .btn {
            background: linear-gradient(135deg, #00d4ff, #9d4edd);
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
            margin-top: 12px;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(0, 212, 255, 0.4);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            margin-top: 10px;
        }

        .results {
            background: rgba(35, 35, 60, 0.95);
            border-radius: 16px;
            padding: 28px;
            margin-top: 20px;
            border: 1px solid rgba(0, 212, 255, 0.2);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .results-header {
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(0, 212, 255, 0.2);
        }

        .results-title {
            color: #00d4ff;
            font-size: 1.5rem;
            margin-bottom: 8px;
        }

        .tagline-card {
            background: rgba(0, 212, 255, 0.05);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 12px;
            padding: 20px;
            margin: 12px 0;
            transition: all 0.3s;
        }

        .tagline-card:hover {
            background: rgba(0, 212, 255, 0.1);
            transform: translateX(5px);
        }

        .tagline-text {
            font-size: 1.6rem;
            color: #fff;
            margin-bottom: 12px;
            font-weight: 700;
        }

        .tagline-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 12px;
        }

        .meta-badge {
            background: rgba(0, 212, 255, 0.2);
            color: #00d4ff;
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 0.85rem;
        }

        .tagline-detail {
            color: #aaa;
            font-size: 0.95rem;
            margin-top: 8px;
            line-height: 1.5;
        }

        .hidden {
            display: none;
        }

        .message {
            text-align: center;
            padding: 40px;
            color: #00d4ff;
            font-size: 1.2rem;
        }

        .refinement-original {
            font-size: 1.3rem;
            color: #888;
            font-style: italic;
            margin-bottom: 20px;
            text-align: center;
            padding: 16px;
            border-bottom: 1px dashed rgba(255,255,255,0.2);
        }

        .quick-keywords {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 8px;
        }

        @media (max-width: 600px) {
            .mode-tabs {
                flex-direction: column;
            }
            .row {
                flex-direction: column;
            }
            h1 {
                font-size: 2rem;
            }
            .tagline-text {
                font-size: 1.3rem;
            }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h1>AI Tagline Creator</h1>
        <p class="subtitle">Craft memorable slogans and taglines in seconds</p>

        <div class="mode-tabs">
            <div class="mode-tab active" onclick="setMode('create')" id="tabCreate">Create</div>
            <div class="mode-tab" onclick="setMode('refine')" id="tabRefine">Refine</div>
            <div class="mode-tab" onclick="setMode('keywords')" id="tabKeywords">From Keywords</div>
        </div>

        <div class="control-panel">
            <!-- Create Mode -->
            <div id="createMode">
                <div class="section">
                    <label for="productName">Product/Brand Name</label>
                    <input type="text" id="productName" placeholder="e.g., EcoCharge, SwiftFlow, NovaTech">
                </div>
                <div class="row">
                    <div class="section">
                        <label for="industry">Industry</label>
                        <input type="text" id="industry" placeholder="e.g., tech, fitness, food">
                    </div>
                    <div class="section">
                        <label for="personality">Brand Personality</label>
                        <select id="personality">
                            <option value="friendly and approachable">Friendly</option>
                            <option value="bold and confident">Bold</option>
                            <option value="sophisticated">Sophisticated</option>
                            <option value="playful">Playful</option>
                            <option value="innovative">Innovative</option>
                            <option value="trustworthy">Trustworthy</option>
                        </select>
                    </div>
                </div>
                <div class="section">
                    <label for="audience">Target Audience</label>
                    <input type="text" id="audience" placeholder="e.g., young professionals, parents, gamers">
                </div>
            </div>

            <!-- Refine Mode -->
            <div id="refineMode" class="hidden">
                <div class="section">
                    <label for="originalTagline">Your Current Tagline</label>
                    <textarea id="originalTagline" style="min-height: 80px;" placeholder="Enter the tagline you want to improve..."></textarea>
                </div>
                <div class="section">
                    <label for="refinementGoal">Refinement Goal</label>
                    <select id="refinementGoal">
                        <option value="Make it more memorable">More Memorable</option>
                        <option value="Make it shorter">Shorter</option>
                        <option value="Add emotional appeal">Emotional Appeal</option>
                        <option value="Increase clarity">Clearer</option>
                        <option value="Make it more unique">More Unique</option>
                    </select>
                </div>
            </div>

            <!-- Keywords Mode -->
            <div id="keywordsMode" class="hidden">
                <div class="section">
                    <label>Keywords (click to add/remove)</label>
                    <div class="quick-keywords">
                        <span class="chip" onclick="toggleKeyword(this)">speed</span>
                        <span class="chip" onclick="toggleKeyword(this)">power</span>
                        <span class="chip" onclick="toggleKeyword(this)">simple</span>
                        <span class="chip" onclick="toggleKeyword(this)">fast</span>
                        <span class="chip" onclick="toggleKeyword(this)">smart</span>
                        <span class="chip" onclick="toggleKeyword(this)">pure</span>
                        <span class="chip" onclick="toggleKeyword(this)">fresh</span>
                        <span class="chip" onclick="toggleKeyword(this)">safe</span>
                        <span class="chip" onclick="toggleKeyword(this)">green</span>
                        <span class="chip" onclick="toggleKeyword(this)">luxury</span>
                    </div>
                    <input type="hidden" id="selectedKeywords" value="">
                    <p style="margin-top: 8px; color: #888; font-size: 0.9rem;">Or type custom keywords separated by commas:</p>
                    <input type="text" id="customKeywords" placeholder="your, keywords, here" style="margin-top: 8px;">
                </div>
                <div class="section">
                    <label for="keywordIndustry">Industry (optional)</label>
                    <input type="text" id="keywordIndustry" placeholder="e.g., automotive, beauty, health">
                </div>
            </div>

            <button class="btn" onclick="generate()">Generate Tagline</button>
            <button class="btn btn-secondary" onclick="startOver()">Reset</button>
        </div>

        <div id="loading" class="hidden message">
            <p>Brainstorming catchy phrases...</p>
        </div>

        <div id="results" class="results hidden">
            <div class="results-header" id="resultsHeader"></div>

            <div id="taglinesList"></div>
        </div>
    </div>

    <script>
        const API_URL = '/api/2026-02-10-ai-tagline-creator';
        let currentMode = 'create';
        let keywordChips = [];

        function setMode(mode) {
            currentMode = mode;
            document.getElementById('createMode').classList.add('hidden');
            document.getElementById('refineMode').classList.add('hidden');
            document.getElementById('keywordsMode').classList.add('hidden');

            document.querySelectorAll('.mode-tab').forEach(tab => tab.classList.remove('active'));
            document.getElementById(`tab${mode.charAt(0).toUpperCase() + mode.slice(1)}`).classList.add('active');

            if (mode === 'create') {
                document.getElementById('createMode').classList.remove('hidden');
            } else if (mode === 'refine') {
                document.getElementById('refineMode').classList.remove('hidden');
            } else if (mode === 'keywords') {
                document.getElementById('keywordsMode').classList.remove('hidden');
            }
        }

        function toggleKeyword(element) {
            element.classList.toggle('selected');
            updateKeywords();
        }

        function updateKeywords() {
            const selected = document.querySelectorAll('.chip.selected');
            keywordChips = Array.from(selected).map(chip => chip.textContent);
            document.getElementById('selectedKeywords').value = keywordChips.join(', ');
        }

        async function generate() {
            let request;

            if (currentMode === 'create') {
                const name = document.getElementById('productName').value.trim();
                if (!name) {
                    alert('Please enter a product/brand name.');
                    return;
                }
                request = {
                    action: 'create',
                    product_name: name,
                    industry: document.getElementById('industry').value.trim(),
                    brand_personality: document.getElementById('personality').value,
                    target_audience: document.getElementById('audience').value.trim()
                };
            } else if (currentMode === 'refine') {
                const original = document.getElementById('originalTagline').value.trim();
                if (!original) {
                    alert('Please enter a tagline to refine.');
                    return;
                }
                request = {
                    action: 'refine',
                    original_tagline: original,
                    refinement_goal: document.getElementById('refinementGoal').value
                };
            } else if (currentMode === 'keywords') {
                const custom = document.getElementById('customKeywords').value.trim();
                let keywords = keywordChips;
                if (custom) {
                    keywords = keywords.concat(custom.split(',').map(k => k.trim()).filter(k => k));
                }
                if (keywords.length === 0) {
                    alert('Please select keywords or enter custom ones.');
                    return;
                }
                request = {
                    action: 'from_keywords',
                    keywords: keywords,
                    industry: document.getElementById('keywordIndustry').value.trim()
                };
            }

            document.querySelector('.control-panel').style.opacity = '0.6';
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('results').classList.add('hidden');

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(request)
                });
                const result = await response.json();

                displayResults(result, currentMode);
            } catch (error) {
                console.error(error);
                alert('Network error. Please try again.');
            }

            document.getElementById('loading').classList.add('hidden');
            document.querySelector('.control-panel').style.opacity = '1';
        }

        function displayResults(result, mode) {
            document.getElementById('results').classList.remove('hidden');
            const header = document.getElementById('resultsHeader');
            const list = document.getElementById('taglinesList');

            list.innerHTML = '';

            let title = '';
            let taglines = [];

            if (mode === 'create') {
                title = `Tagline Ideas for ${result.product || 'Your Brand'}`;
                taglines = result.taglines || [];
            } else if (mode === 'refine') {
                header.innerHTML = `
                    <div class="refinement-original">Original: "${result.original}"</div>
                    <div class="results-title">Refined Versions</div>
                `;
                taglines = result.refined.refinements || [];
            } else if (mode === 'keywords') {
                const kw = result.keywords.slice(0, 3).join(', ');
                title = `Taglines using keywords: ${kw}${result.keywords.length > 3 ? '...' : ''}`;
                taglines = result.taglines || [];
            }

            if (mode !== 'refine') {
                header.innerHTML = `<div class="results-title">${title}</div>`;
            }

            if (!taglines || taglines.length === 0) {
                list.innerHTML = '<div style="padding: 20px; text-align: center; color: #888;">No taglines generated.</div>';
                return;
            }

            taglines.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'tagline-card';
                card.style.animationDelay = `${index * 0.1}s`;

                const metaBadges = [];
                if (item.tone) metaBadges.push(`<span class="meta-badge">${item.tone}</span>`);
                if (item.word_count) metaBadges.push(`<span class="meta-badge">${item.word_count} words</span>`);
                if (item.uniqueness_score) metaBadges.push(`<span class="meta-badge">⭐ ${item.uniqueness_score}/10 unique</span>`);
                if (item.catchiness) metaBadges.push(`<span class="meta-badge">🔥 ${item.catchiness}/10 catchy</span>`);

                let detailText = '';
                if (item.memorability_hook) {
                    detailText = `<div class="tagline-detail"><strong>Sticks because:</strong> ${item.memorability_hook}</div>`;
                } else if (item.improvement) {
                    detailText = `<div class="tagline-detail"><strong>Improvement:</strong> ${item.improvement}</div>`;
                }
                if (item.keywords_used) {
                    detailText += `<div class="tagline-detail"><strong>Keywords:</strong> ${item.keywords_used.join(', ')}</div>`;
                }
                if (item.creative_interpretation) {
                    detailText += `<div class="tagline-detail"><em>${item.creative_interpretation}</em></div>`;
                }

                card.innerHTML = `
                    <div class="tagline-text">${item.tagline || ''}</div>
                    <div class="tagline-meta">${metaBadges.join('')}</div>
                    ${detailText}
                `;

                list.appendChild(card);
            });
        }

        function startOver() {
            document.getElementById('results').classList.add('hidden');
            document.getElementById('productName').value = '';
            document.getElementById('industry').value = '';
            document.getElementById('audience').value = '';
            document.getElementById('originalTagline').value = '';
            document.getElementById('customKeywords').value = '';
            document.querySelectorAll('.chip').forEach(chip => chip.classList.remove('selected'));
            keywordChips = [];
        }
    </script>
</body>
</html>
