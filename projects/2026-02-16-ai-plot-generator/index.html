<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Plot Generator - 2026-02-16</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            min-height: 100vh;
            padding: 20px;
            color: #e0e0e0;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            text-align: center;
            color: #00d9ff;
            margin-bottom: 8px;
            font-size: 2.6rem;
            text-shadow: 0 2px 15px rgba(0, 217, 255, 0.5);
        }

        .subtitle {
            text-align: center;
            color: #00b8cc;
            margin-bottom: 40px;
            font-size: 1.2rem;
        }

        .mode-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
        }

        .mode-tab {
            flex: 1;
            padding: 14px;
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(0, 217, 255, 0.3);
            border-radius: 12px;
            color: #00d9ff;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s;
            font-weight: 600;
        }

        .mode-tab.active {
            background: rgba(0, 217, 255, 0.2);
            border-color: #00d9ff;
        }

        .mode-tab:hover:not(.active) {
            background: rgba(0, 217, 255, 0.1);
        }

        .control-panel {
            background: rgba(25, 40, 50, 0.95);
            border-radius: 16px;
            padding: 28px;
            margin-bottom: 32px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(0, 217, 255, 0.2);
        }

        .section {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #00d9ff;
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        input[type="text"], select, textarea {
            width: 100%;
            padding: 12px;
            background: rgba(35, 60, 75, 0.8);
            border: 2px solid rgba(0, 217, 255, 0.3);
            border-radius: 10px;
            font-size: 1rem;
            color: #e0e0e0;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #00d9ff;
            box-shadow: 0 0 15px rgba(0, 217, 255, 0.3);
        }

        select {
            cursor: pointer;
        }

        .row {
            display: flex;
            gap: 16px;
        }

        .row .section {
            flex: 1;
        }

        .btn {
            background: linear-gradient(135deg, #00d9ff, #0099cc);
            color: #0f2027;
            border: none;
            padding: 16px 32px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
            margin-top: 12px;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(0, 217, 255, 0.5);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #ff6b6b, #ee5a52);
            color: white;
            margin-top: 10px;
        }

        .results {
            background: rgba(25, 40, 50, 0.95);
            border-radius: 16px;
            padding: 32px;
            margin-top: 20px;
            border: 1px solid rgba(0, 217, 255, 0.3);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .results-header {
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 2px solid rgba(0, 217, 255, 0.3);
        }

        .results-title {
            color: #00d9ff;
            font-size: 1.8rem;
            margin-bottom: 8px;
        }

        .logline {
            font-size: 1.3rem;
            color: #fff;
            line-height: 1.5;
            padding: 16px;
            background: rgba(0, 217, 255, 0.1);
            border-radius: 8px;
            margin-bottom: 24px;
            border-left: 4px solid #00d9ff;
        }

        .section-title {
            color: #00d9ff;
            font-size: 1.2rem;
            margin: 20px 0 12px;
            font-weight: 600;
        }

        .structure-list {
            list-style: none;
            padding: 0;
        }

        .structure-list li {
            padding: 12px 16px;
            margin: 8px 0;
            background: rgba(0, 217, 255, 0.05);
            border-radius: 8px;
            border-left: 3px solid #00d9ff;
        }

        .act-number {
            font-weight: 700;
            color: #00d9ff;
            margin-right: 8px;
        }

        .twist-list, .trope-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            list-style: none;
            padding: 0;
        }

        .twist-list li, .trope-list li {
            background: rgba(255, 107, 107, 0.2);
            color: #ff8787;
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid rgba(255, 107, 107, 0.3);
        }

        .climax-box, .resolution-box {
            padding: 16px;
            background: rgba(255, 215, 0, 0.1);
            border-radius: 8px;
            margin-top: 12px;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }

        .twist-section {
            background: rgba(255, 107, 107, 0.1);
            padding: 16px;
            border-radius: 8px;
            margin-top: 20px;
            border: 1px solid rgba(255, 107, 107, 0.3);
        }

        .twist-added {
            font-size: 1.2rem;
            color: #ff8787;
            margin-bottom: 12px;
        }

        .mini-section {
            margin: 16px 0;
            padding: 12px;
            background: rgba(0, 217, 255, 0.05);
            border-radius: 8px;
        }

        .mini-label {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 4px;
            text-transform: uppercase;
        }

        .mini-value {
            color: #e0e0e0;
        }

        .hidden {
            display: none;
        }

        .message {
            text-align: center;
            padding: 40px;
            color: #00d9ff;
            font-size: 1.3rem;
        }

        .act-item {
            margin-bottom: 20px;
        }

        .act-title {
            font-weight: 700;
            color: #00d9ff;
            margin-bottom: 4px;
        }

        .act-summary {
            color: #ccc;
            line-height: 1.5;
            padding-left: 16px;
        }

        @media (max-width: 600px) {
            .mode-tabs {
                flex-direction: column;
            }
            .row {
                flex-direction: column;
            }
            h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎬 AI Plot Generator</h1>
        <p class="subtitle">Design compelling story structures with AI assistance</p>

        <div class="mode-tabs">
            <div class="mode-tab active" onclick="setMode('generate')" id="tabGenerate">Full Plot</div>
            <div class="mode-tab" onclick="setMode('twist')" id="tabTwist">Add Twist</div>
            <div class="mode-tab" onclick="setMode('structure')" id="tabStructure">Three-Act Structure</div>
        </div>

        <div class="control-panel">
            <!-- Generate Mode -->
            <div id="generateMode">
                <div class="row">
                    <div class="section">
                        <label for="genre">Genre</label>
                        <select id="genre">
                            <option value="fantasy">Fantasy</option>
                            <option value="sci-fi">Science Fiction</option>
                            <option value="mystery">Mystery</option>
                            <option value="thriller">Thriller</option>
                            <option value="romance">Romance</option>
                            <option value="horror">Horror</option>
                            <option value="adventure">Adventure</option>
                            <option value="drama">Drama</option>
                        </select>
                    </div>
                    <div class="section">
                        <label for="length">Story Length</label>
                        <select id="length">
                            <option value="short">Short Story</option>
                            <option value="novella" selected>Novella</option>
                            <option value="novel">Novel</option>
                        </select>
                    </div>
                </div>
                <div class="section">
                    <label for="protagonist">Protagonist Type (optional)</label>
                    <input type="text" id="protagonist" placeholder="e.g., reluctant hero, veteran detective, teenage witch">
                </div>
            </div>

            <!-- Twist Mode -->
            <div id="twistMode" class="hidden">
                <p style="margin-bottom: 20px; color: #888;">First generate a plot outline, then add a twist to it. Paste a plot outline here in JSON format or use a generated one.</p>
                <textarea id="plotInput" style="min-height: 200px; font-family: monospace; font-size: 0.85rem;" placeholder='Paste plot outline JSON, e.g.:
{
  "title": "My Story",
  "structure": [...]
}'></textarea>
                <div class="section" style="margin-top: 16px;">
                    <label for="twistType">Twist Type</label>
                    <select id="twistType">
                        <option value="unexpected">Unexpected</option>
                        <option value="shocking">Shocking</option>
                        <option value="bittersweet">Bittersweet</option>
                        <option value="redemption">Redemption</option>
                        <option value="revenge">Revenge</option>
                    </select>
                </div>
            </div>

            <!-- Structure Mode -->
            <div id="structureMode" class="hidden">
                <div class="section">
                    <label for="topic">Story Topic</label>
                    <input type="text" id="topic" placeholder="e.g., betrayal, second chances, survival, redemption">
                </div>
                <div class="section">
                    <label for="structureGenre">Genre</label>
                    <select id="structureGenre">
                        <option value="drama">Drama</option>
                        <option value="fantasy">Fantasy</option>
                        <option value="romance">Romance</option>
                        <option value="thriller">Thriller</option>
                        <option value="comedy">Comedy</option>
                    </select>
                </div>
            </div>

            <button class="btn" onclick="generatePlot()">🎯 Generate</button>
            <button class="btn btn-secondary" onclick="startOver()">Reset</button>
        </div>

        <div id="loading" class="hidden message">
            <p>Mapping out the story beats...</p>
        </div>

        <div id="results" class="results hidden">
            <div id="resultsContent"></div>
        </div>
    </div>

    <script>
        const API_URL = '/api/2026-02-16-ai-plot-generator';
        let currentMode = 'generate';

        function setMode(mode) {
            currentMode = mode;
            document.getElementById('generateMode').classList.add('hidden');
            document.getElementById('twistMode').classList.add('hidden');
            document.getElementById('structureMode').classList.add('hidden');

            document.querySelectorAll('.mode-tab').forEach(tab => tab.classList.remove('active'));
            document.getElementById(`tab${mode.charAt(0).toUpperCase() + mode.slice(1)}`).classList.add('active');

            if (mode === 'generate') {
                document.getElementById('generateMode').classList.remove('hidden');
            } else if (mode === 'twist') {
                document.getElementById('twistMode').classList.remove('hidden');
            } else if (mode === 'structure') {
                document.getElementById('structureMode').classList.remove('hidden');
            }
        }

        async function generatePlot() {
            let request;

            if (currentMode === 'generate') {
                request = {
                    action: 'generate',
                    genre: document.getElementById('genre').value,
                    length: document.getElementById('length').value,
                    protagonist_type: document.getElementById('protagonist').value.trim()
                };
            } else if (currentMode === 'twist') {
                const plotInput = document.getElementById('plotInput').value.trim();
                if (!plotInput) {
                    alert('Please paste a plot outline (JSON format).');
                    return;
                }
                let plotOutline;
                try {
                    plotOutline = JSON.parse(plotInput);
                } catch (e) {
                    alert('Invalid JSON. Please check the format.');
                    return;
                }
                request = {
                    action: 'twist',
                    plot_outline: plotOutline,
                    twist_type: document.getElementById('twistType').value
                };
            } else if (currentMode === 'structure') {
                const topic = document.getElementById('topic').value.trim();
                if (!topic) {
                    alert('Please enter a story topic.');
                    return;
                }
                request = {
                    action: 'structure',
                    topic: topic,
                    genre: document.getElementById('structureGenre').value
                };
            }

            document.querySelector('.control-panel').style.opacity = '0.6';
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('results').classList.add('hidden');

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(request)
                });
                const result = await response.json();

                displayResults(result, currentMode);
            } catch (error) {
                console.error(error);
                alert('Network error. Please try again.');
            }

            document.getElementById('loading').classList.add('hidden');
            document.querySelector('.control-panel').style.opacity = '1';
        }

        function displayResults(result, mode) {
            document.getElementById('results').classList.remove('hidden');
            const content = document.getElementById('resultsContent');
            content.innerHTML = '';

            if (mode === 'generate') {
                const plot = result.plot;
                content.innerHTML = `
                    <div class="results-header">
                        <div class="results-title">📖 ${plot.title}</div>
                        <div class="meta-grid" style="margin-top:12px;">
                            <div class="meta-item">
                                <div class="meta-label">Genre</div>
                                <div class="meta-value">${plot.genre}</div>
                            </div>
                            <div class="meta-item">
                                <div class="meta-label">Length</div>
                                <div class="meta-value">${plot.length}</div>
                            </div>
                        </div>
                    </div>
                    <div class="logline">${plot.hook}</div>

                    <div class="section-title">📋 Plot Structure</div>
                    <ul class="structure-list">
                        ${plot.structure.map(act => `
                            <li>
                                <div class="act-item">
                                    <span class="act-number">Act ${act.act_number}: ${act.title}</span>
                                    <div class="act-summary">${act.summary}</div>
                                </div>
                            </li>
                        `).join('')}
                    </ul>

                    <div class="section-title">🌟 Key Twists & Turns</div>
                    <ul class="twist-list">
                        ${plot.key_twists.map(twist => `<li>${twist}</li>`).join('')}
                    </ul>

                    <div class="section-title">⚡ Climax</div>
                    <div class="climax-box">${plot.climax}</div>

                    <div class="section-title">🏁 Resolution</div>
                    <div class="resolution-box">${plot.resolution}</div>

                    <div class="section-title">🎭 Genre Conventions Used</div>
                    <ul class="trope-list">
                        ${plot.genre_conventions.map(trope => `<li>${trope}</li>`).join('')}
                    </ul>
                `;

            } else if (mode === 'twist') {
                const twist = result.twist;
                content.innerHTML = `
                    <div class="results-header">
                        <div class="results-title">🌀 Plot Twist Added!</div>
                        <div style="margin-top:8px; color:#888;">For: ${twist.original_title}</div>
                    </div>
                    <div class="twist-section">
                        <div class="twist-added">💥 ${twist.twist_added}</div>
                        <div class="mini-section">
                            <div class="mini-label">Twist Type</div>
                            <div class="mini-value">${result.twist_type}</div>
                        </div>
                        <div class="mini-section">
                            <div class="mini-label">Reader Reaction</div>
                            <div class="mini-value">${twist.reader_reaction}</div>
                        </div>
                        <div class="mini-section">
                            <div class="mini-label">Why It Works</div>
                            <div class="mini-value">${twist.twist_reasoning}</div>
                        </div>
                    </div>

                    <div class="section-title">📝 Modified Acts</div>
                    <ul class="structure-list">
                        ${twist.new_structure.map(act => `
                            <li>
                                <div class="act-item">
                                    <span class="act-number">Act ${act.act_number}</span>
                                    <div class="act-summary">${act.summary}</div>
                                </div>
                            </li>
                        `).join('')}
                    </ul>
                `;

            } else if (mode === 'structure') {
                const struct = result.structure;
                content.innerHTML = `
                    <div class="results-header">
                        <div class="results-title">📚 Three-Act Structure</div>
                        <div style="margin-top:8px; color:#888;">${struct.genre} • Topic: ${result.topic}</div>
                    </div>

                    <div class="logline">${struct.logline}</div>

                    <div class="section-title">ACT I: SETUP</div>
                    <div class="mini-section">
                        <div class="mini-label">Ordinary World</div>
                        <div class="mini-value">${struct.act_i_setup.ordinary_world}</div>
                    </div>
                    <div class="mini-section">
                        <div class="mini-label">Inciting Incident</div>
                        <div class="mini-value">${struct.act_i_setup.inciting_incident}</div>
                    </div>
                    <div class="mini-section">
                        <div class="mini-label">Key Character</div>
                        <div class="mini-value">${struct.act_i_setup.key_character}</div>
                    </div>

                    <div class="section-title">ACT II: CONFRONTATION</div>
                    <div class="mini-section">
                        <div class="mini-label">Rising Action</div>
                        <div class="mini-value">${struct.act_ii_confrontation.rising_action}</div>
                    </div>
                    <div class="mini-section">
                        <div class="mini-label">Midpoint</div>
                        <div class="mini-value">${struct.act_ii_confrontation.midpoint}</div>
                    </div>
                    <div class="mini-section">
                        <div class="mini-label">Darkest Moment</div>
                        <div class="mini-value">${struct.act_ii_confrontation.darkest_moment}</div>
                    </div>

                    <div class="section-title">ACT III: RESOLUTION</div>
                    <div class="mini-section">
                        <div class="mini-label">Climax</div>
                        <div class="mini-value">${struct.act_iii_resolution.climax}</div>
                    </div>
                    <div class="mini-section">
                        <div class="mini-label">Denouement</div>
                        <div class="mini-value">${struct.act_iii_resolution.denouement}</div>
                    </div>
                    <div class="mini-section">
                        <div class="mini-label">Theme Fulfilled</div>
                        <div class="mini-value">${struct.act_iii_resolution.theme_fulfilled}</div>
                    </div>

                    <div class="mini-section" style="margin-top:16px;">
                        <div class="mini-label">Central Conflict</div>
                        <div class="mini-value">${struct.central_conflict}</div>
                    </div>
                    <div class="mini-section">
                        <div class="mini-label">Thematic Statement</div>
                        <div class="mini-value" style="font-style:italic;">${struct.thematic_statement}</div>
                    </div>
                `;
            }
        }

        function startOver() {
            document.getElementById('results').classList.add('hidden');
            document.getElementById('protagonist').value = '';
            document.getElementById('plotInput').value = '';
            document.getElementById('topic').value = '';
        }
    </script>
</body>
</html>
