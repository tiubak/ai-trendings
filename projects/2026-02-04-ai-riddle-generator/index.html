<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Riddle Generator - 2026-02-04</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Comic Neue', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #4a0080 0%, #2e0036 50%, #1a0024 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #e0e0e0;
        }

        .container {
            background: rgba(30, 10, 40, 0.95);
            backdrop-filter: blur(15px);
            border-radius: 24px;
            padding: 48px;
            max-width: 800px;
            width: 100%;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.6);
            border: 2px solid rgba(255, 215, 0, 0.3);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        h1 {
            text-align: center;
            color: #ffd700;
            margin-bottom: 12px;
            font-size: 2.6rem;
            text-shadow: 0 2px 10px rgba(255, 215, 0, 0.5);
        }

        .subtitle {
            text-align: center;
            color: #daa520;
            margin-bottom: 40px;
            font-size: 1.2rem;
        }

        .section {
            margin-bottom: 24px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #ffd700;
        }

        select, input[type="text"] {
            width: 100%;
            padding: 14px;
            background: rgba(40, 20, 50, 0.8);
            border: 2px solid rgba(255, 215, 0, 0.4);
            border-radius: 12px;
            font-size: 1rem;
            color: #e0e0e0;
            transition: all 0.3s;
            cursor: pointer;
        }

        select:focus, input[type="text"]:focus {
            outline: none;
            border-color: #ffd700;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
        }

        .row {
            display: flex;
            gap: 16px;
        }

        .row .section {
            flex: 1;
        }

        .btn {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            color: #1a0024;
            border: none;
            padding: 16px 32px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
            margin-top: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(255, 215, 0, 0.5);
        }

        .btn:active {
            transform: translateY(-1px);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: linear-gradient(135deg, #9932cc, #8a2be2);
            color: white;
            text-transform: none;
            margin-top: 10px;
        }

        .riddle-card {
            background: rgba(40, 20, 50, 0.9);
            border: 2px solid rgba(255, 215, 0, 0.5);
            border-radius: 16px;
            padding: 32px;
            margin: 20px 0;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .riddle-text {
            font-size: 1.6rem;
            line-height: 1.8;
            color: #fff;
            text-align: center;
            margin-bottom: 24px;
        }

        .riddle-meta {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            color: #daa520;
        }

        .riddle-meta span {
            background: rgba(255, 215, 0, 0.1);
            padding: 6px 14px;
            border-radius: 20px;
        }

        .answer-section {
            margin-top: 24px;
        }

        .answer-input {
            width: 100%;
            padding: 14px;
            background: rgba(40, 20, 50, 0.9);
            border: 2px solid rgba(255, 215, 0, 0.4);
            border-radius: 12px;
            font-size: 1.1rem;
            color: #e0e0e0;
            margin-bottom: 12px;
        }

        .hint-box {
            background: rgba(255, 215, 0, 0.1);
            border: 1px dashed rgba(255, 215, 0, 0.5);
            border-radius: 8px;
            padding: 14px;
            margin-top: 12px;
            color: #ffd700;
        }

        .hint-title {
            font-weight: 600;
            margin-bottom: 8px;
        }

        .feedback {
            padding: 16px;
            border-radius: 12px;
            margin-top: 16px;
            font-size: 1.1rem;
            text-align: center;
        }

        .feedback.correct {
            background: rgba(0, 255, 0, 0.2);
            border: 2px solid #00ff00;
            color: #90ee90;
        }

        .feedback.incorrect {
            background: rgba(255, 0, 0, 0.2);
            border: 2px solid #ff4444;
            color: #ff9999;
        }

        .hidden {
            display: none;
        }

        .message {
            text-align: center;
            padding: 20px;
            color: #ffd700;
            font-style: italic;
        }

        .steps-list {
            padding-left: 24px;
            margin: 12px 0;
        }

        .steps-list li {
            margin-bottom: 8px;
            line-height: 1.6;
        }

        .generated-riddle-list {
            margin-top: 20px;
        }

        .generated-item {
            background: rgba(255, 215, 0, 0.1);
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .generated-item:hover {
            background: rgba(255, 215, 0, 0.2);
            transform: translateX(5px);
        }

        .generated-item .question {
            font-weight: 600;
            color: #ffd700;
        }

        .generated-item .preview {
            color: #bbb;
            font-size: 0.9rem;
        }

        select option {
            background: #1a0024;
        }

        @media (max-width: 600px) {
            .container {
                padding: 28px;
            }
            .row {
                flex-direction: column;
            }
            h1 {
                font-size: 2rem;
            }
            .riddle-text {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>AI Riddle Generator</h1>
        <p class="subtitle">Challenge your mind with clever puzzles</p>

        <div id="inputSection">
            <div class="section">
                <label for="mode">Choose Mode</label>
                <select id="mode" onchange="toggleMode()">
                    <option value="generate">Random Riddle</option>
                    <option value="custom">Custom Topic</option>
                </select>
            </div>

            <div class="row" id="generateOptions">
                <div class="section">
                    <label for="difficulty">Difficulty</label>
                    <select id="difficulty">
                        <option value="easy">Easy</option>
                        <option value="medium" selected>Medium</option>
                        <option value="hard">Hard</option>
                    </select>
                </div>
                <div class="section">
                    <label for="category">Category</label>
                    <select id="category">
                        <option value="nature">Nature</option>
                        <option value="animals">Animals</option>
                        <option value="objects">Everyday Objects</option>
                        <option value="food">Food & Drink</option>
                        <option value="places">Places</option>
                        <option value="concepts">Abstract Concepts</option>
                    </select>
                </div>
            </div>

            <div class="section hidden" id="customSection">
                <label for="topic">Your Topic</label>
                <input type="text" id="topic" placeholder="e.g., coffee, internet, time, friendship...">
            </div>

            <button class="btn" onclick="getRiddle()" id="getBtn">Generate Riddle</button>
        </div>

        <div id="riddleSection" class="hidden">
            <div class="riddle-card">
                <div class="riddle-text" id="riddleText"></div>
                <div class="riddle-meta">
                    <span id="difficultyBadge"></span>
                    <span id="categoryBadge"></span>
                </div>

                <div class="answer-section">
                    <label style="color: #ffd700; margin-bottom: 8px;">Your Answer</label>
                    <input type="text" class="answer-input" id="userAnswer" placeholder="Type your answer and press Enter..." onkeypress="if(event.key==='Enter') checkAnswer()">
                    <button class="btn" onclick="checkAnswer()">Check Answer</button>
                    <button class="btn btn-secondary" onclick="showHint()">Need a Hint</button>
                </div>

                <div class="hint-box hidden" id="hintBox">
                    <div class="hint-title">Hint:</div>
                    <div id="hintText"></div>
                </div>

                <div class="feedback hidden" id="feedback"></div>
            </div>

            <div id="multiHintSection" class="hidden">
                <div class="section">
                    <label style="color: #ffd700;">Progressive Hints</label>
                    <ul class="steps-list" id="hintsList"></ul>
                </div>
            </div>

            <button class="btn btn-secondary" onclick="nextRiddle()">Next Riddle</button>
            <button class="btn" onclick="startOver()">Back to Menu</button>
        </div>

        <div id="loading" class="hidden message">
            <p>Consulting the riddle master...</p>
        </div>
    </div>

    <script>
        const API_URL = '/api/2026-02-04-ai-riddle-generator';
        let currentRiddle = null;

        async function apiCall(action, data = {}) {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action, ...data })
            });
            return response.json();
        }

        function toggleMode() {
            const mode = document.getElementById('mode').value;
            const generateOptions = document.getElementById('generateOptions');
            const customSection = document.getElementById('customSection');

            if (mode === 'custom') {
                generateOptions.classList.add('hidden');
                customSection.classList.remove('hidden');
            } else {
                generateOptions.classList.remove('hidden');
                customSection.classList.add('hidden');
            }
        }

        async function getRiddle() {
            const mode = document.getElementById('mode').value;
            const difficulty = document.getElementById('difficulty').value;
            const category = document.getElementById('category').value;
            const topic = document.getElementById('topic').value.trim();

            document.getElementById('inputSection').classList.add('hidden');
            document.getElementById('loading').classList.remove('hidden');

            try {
                let result;
                if (mode === 'generate') {
                    result = await apiCall('generate', { difficulty, category });
                    currentRiddle = result.riddle;
                } else {
                    if (!topic) {
                        alert('Please enter a topic.');
                        document.getElementById('inputSection').classList.remove('hidden');
                        document.getElementById('loading').classList.add('hidden');
                        return;
                    }
                    result = await apiCall('create_custom', { topic, creativity_level: 'medium' });
                    currentRiddle = result.riddle;
                }

                displayRiddle(currentRiddle);
            } catch (error) {
                console.error(error);
                alert('Network error. Please try again.');
                document.getElementById('inputSection').classList.remove('hidden');
            }

            document.getElementById('loading').classList.add('hidden');
        }

        function displayRiddle(riddle) {
            document.getElementById('riddleText').textContent = riddle.riddle || 'No riddle available.';
            document.getElementById('difficultyBadge').textContent = riddle.difficulty || riddle.difficulty_estimate || 'Unknown';
            document.getElementById('categoryBadge').textContent = riddle.category || riddle.topic_subcategory || 'General';

            // Store answer for checking
            currentRiddle.correct_answer = riddle.answer;

            // Clear previous state
            document.getElementById('userAnswer').value = '';
            document.getElementById('feedback').classList.add('hidden');
            document.getElementById('hintBox').classList.add('hidden');
            document.getElementById('multiHintSection').classList.add('hidden');

            // Display hints if available
            if (riddle.hints && riddle.hints.length > 0) {
                const hintsList = document.getElementById('hintsList');
                hintsList.innerHTML = '';
                riddle.hints.forEach((hint, index) => {
                    hintsList.innerHTML += `<li><strong>Hint ${index + 1}:</strong> ${hint}</li>`;
                });
            }

            document.getElementById('riddleSection').classList.remove('hidden');
        }

        async function checkAnswer() {
            const userAnswer = document.getElementById('userAnswer').value.trim();
            if (!userAnswer) {
                alert('Please enter an answer.');
                return;
            }

            document.getElementById('loading').classList.remove('hidden');

            try {
                const result = await apiCall('solve', {
                    user_answer: userAnswer,
                    riddle: currentRiddle.riddle,
                    correct_answer: currentRiddle.correct_answer
                });

                displayFeedback(result.evaluation);
            } catch (error) {
                console.error(error);
                alert('Network error.');
            }

            document.getElementById('loading').classList.add('hidden');
        }

        function displayFeedback(evaluation) {
            const feedbackEl = document.getElementById('feedback');
            feedbackEl.classList.remove('hidden', 'correct', 'incorrect');

            if (evaluation.is_correct) {
                feedbackEl.classList.add('correct');
                feedbackEl.innerHTML = `
                    <strong>✨ Correct!</strong><br>
                    ${evaluation.feedback || "Well done!"}
                `;
            } else {
                feedbackEl.classList.add('incorrect');
                feedbackEl.innerHTML = `
                    <strong>Not quite...</strong><br>
                    ${evaluation.feedback || `The answer is: ${evaluation.if_wrong}`}
                `;
            }
        }

        function showHint() {
            document.getElementById('multiHintSection').classList.remove('hidden');

            if (currentRiddle.hints && currentRiddle.hints.length > 0) {
                document.getElementById('hintBox').classList.remove('hidden');
                document.getElementById('hintText').textContent = currentRiddle.hints[0];
                document.getElementById('hintsList').style.background = 'rgba(255,215,0,0.05)';
                document.getElementById('hintsList').style.padding = '12px';
                document.getElementById('hintsList').style.borderRadius = '8px';
            } else {
                document.getElementById('hintBox').classList.remove('hidden');
                document.getElementById('hintText').textContent = "Think carefully about the words and what they might represent.";
            }
        }

        function nextRiddle() {
            document.getElementById('riddleSection').classList.add('hidden');
            document.getElementById('inputSection').classList.remove('hidden');
            document.getElementById('topic').value = '';
        }

        function startOver() {
            document.getElementById('riddleSection').classList.add('hidden');
            document.getElementById('inputSection').classList.remove('hidden');
            document.getElementById('topic').value = '';
            document.getElementById('mode').value = 'generate';
            toggleMode();
        }
    </script>
</body>
</html>
