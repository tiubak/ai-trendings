<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Meme Generator | AI Trendings</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.8);
            font-size: 1.1rem;
            margin-bottom: 30px;
        }

        .main-content {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .back-link {
            display: inline-block;
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            margin-bottom: 20px;
        }

        .back-link:hover {
            color: #fff;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }

        input[type="text"], textarea {
            width: 100%;
            padding: 12px 16px;
            border-radius: 8px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        textarea {
            min-height: 100px;
            resize: vertical;
        }

        .button-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }

        button {
            padding: 14px 24px;
            border-radius: 8px;
            border: none;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            flex: 1;
            min-width: 150px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        button.secondary {
            background: rgba(255, 255, 255, 0.2);
        }

        .meme-preview {
            margin-top: 40px;
            text-align: center;
        }

        .meme-preview h3 {
            margin-bottom: 20px;
            font-size: 1.5rem;
        }

        .meme-image {
            max-width: 100%;
            max-height: 500px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            border: 4px solid rgba(255, 255, 255, 0.2);
        }

        .placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 512px;
            height: 512px;
            max-width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 1.2rem;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .hidden {
            display: none;
        }

        .error {
            color: #ff6b6b;
            background: rgba(255, 107, 107, 0.1);
            padding: 12px;
            border-radius: 8px;
            margin-top: 20px;
        }

        .success {
            color: #51cf66;
            background: rgba(81, 207, 102, 0.1);
            padding: 12px;
            border-radius: 8px;
            margin-top: 20px;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }

            .main-content {
                padding: 20px;
            }

            .button-group {
                flex-direction: column;
            }

            button {
                width: 100%;
            }

            .placeholder {
                width: 100%;
                height: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <a href="../" class="back-link">← Back to AI Trendings</a>
            <h1>AI Meme Generator</h1>
            <p class="subtitle">Generate hilarious memes using AI-generated images and witty captions — all for free!</p>
        </header>

        <div class="main-content">
            <div class="form-group">
                <label for="prompt">AI Image Prompt (optional)</label>
                <input type="text" id="prompt" placeholder="e.g., A cat wearing sunglasses, futuristic cityscape, funny dog...">
                <small style="color: rgba(255,255,255,0.6);">Leave blank to use a plain background image.</small>
            </div>

            <div class="form-group">
                <label for="top-text">Top Text</label>
                <input type="text" id="top-text" placeholder="Top caption (e.g., WHEN YOU SEE IT...)">
            </div>

            <div class="form-group">
                <label for="bottom-text">Bottom Text</label>
                <input type="text" id="bottom-text" placeholder="Bottom caption (e.g., ...BUT IT'S TOO LATE)">
            </div>

            <div class="button-group">
                <button id="generate-btn">Generate Meme</button>
                <button id="generate-caption-btn" class="secondary">Generate AI Caption</button>
                <button id="random-btn" class="secondary">Random Idea</button>
                <button id="download-btn" disabled>Download Meme</button>
            </div>

            <div id="error-message" class="error hidden"></div>
            <div id="success-message" class="success hidden"></div>

            <div class="meme-preview">
                <h3>Your Meme</h3>
                <div id="image-placeholder" class="placeholder">
                    Your generated meme will appear here
                </div>
                <img id="meme-image" class="meme-image hidden" alt="Generated Meme">
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api';

        const elements = {
            prompt: document.getElementById('prompt'),
            topText: document.getElementById('top-text'),
            bottomText: document.getElementById('bottom-text'),
            generateBtn: document.getElementById('generate-btn'),
            generateCaptionBtn: document.getElementById('generate-caption-btn'),
            randomBtn: document.getElementById('random-btn'),
            downloadBtn: document.getElementById('download-btn'),
            imagePlaceholder: document.getElementById('image-placeholder'),
            memeImage: document.getElementById('meme-image'),
            errorMessage: document.getElementById('error-message'),
            successMessage: document.getElementById('success-message')
        };

        let currentMemeUrl = null;

        function showError(msg) {
            elements.errorMessage.textContent = msg;
            elements.errorMessage.classList.remove('hidden');
            elements.successMessage.classList.add('hidden');
        }

        function showSuccess(msg) {
            elements.successMessage.textContent = msg;
            elements.successMessage.classList.remove('hidden');
            elements.errorMessage.classList.add('hidden');
        }

        function clearMessages() {
            elements.errorMessage.classList.add('hidden');
            elements.successMessage.classList.add('hidden');
        }

        function setLoading(loading) {
            elements.generateBtn.disabled = loading;
            elements.generateCaptionBtn.disabled = loading;
            elements.randomBtn.disabled = loading;
            if (loading) {
                elements.generateBtn.innerHTML = '<span class="loading"></span> Generating...';
            } else {
                elements.generateBtn.textContent = 'Generate Meme';
            }
        }

        async function generateMeme() {
            clearMessages();
            setLoading(true);

            const payload = {
                prompt: elements.prompt.value.trim(),
                top_text: elements.topText.value.trim(),
                bottom_text: elements.bottomText.value.trim(),
                width: 512,
                height: 512
            };

            try {
                const response = await fetch(`${API_BASE}/create-meme`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) {
                    const err = await response.text();
                    throw new Error(err || 'Failed to generate meme');
                }

                const blob = await response.blob();
                const url = URL.createObjectURL(blob);
                currentMemeUrl = url;

                elements.memeImage.src = url;
                elements.memeImage.classList.remove('hidden');
                elements.imagePlaceholder.classList.add('hidden');
                elements.downloadBtn.disabled = false;

                showSuccess('Meme generated successfully!');
            } catch (error) {
                showError(error.message || 'Something went wrong. Please try again.');
                console.error(error);
            } finally {
                setLoading(false);
            }
        }

        async function generateCaption() {
            const prompt = elements.prompt.value.trim() || elements.topText.value.trim() || elements.bottomText.value.trim();
            if (!prompt) {
                showError('Please enter a prompt or caption to generate an AI caption.');
                return;
            }

            clearMessages();
            elements.generateCaptionBtn.innerHTML = '<span class="loading"></span> Generating...';
            elements.generateCaptionBtn.disabled = true;

            try {
                const params = new URLSearchParams({ prompt, max_length: 100 });
                const response = await fetch(`${API_BASE}/generate-caption?${params}`);
                if (!response.ok) throw new Error('Failed to generate caption');
                const data = await response.json();
                // Pick a random caption slot to fill
                if (!elements.topText.value.trim()) {
                    elements.topText.value = data.caption;
                } else if (!elements.bottomText.value.trim()) {
                    elements.bottomText.value = data.caption;
                } else {
                    // Both filled, replace bottom text
                    elements.bottomText.value = data.caption;
                }
                showSuccess('AI caption generated!');
            } catch (error) {
                showError('Failed to generate caption. Please try again.');
            } finally {
                elements.generateCaptionBtn.textContent = 'Generate AI Caption';
                elements.generateCaptionBtn.disabled = false;
            }
        }

        function randomIdea() {
            const ideas = [
                {
                    prompt: 'A cat wearing sunglasses driving a car',
                    top: 'WHEN YOU FINALLY GET YOUR LICENSE',
                    bottom: 'BUT YOU REALIZE YOU HAVE NOWHERE TO GO'
                },
                {
                    prompt: 'A dinosaur in a business meeting',
                    top: 'ME TRYING TO ACT PROFESSIONAL',
                    bottom: 'WHEN SOMEONE ASKS A BASIC QUESTION'
                },
                {
                    prompt: 'A robot cooking dinner',
                    top: 'WHEN YOU FOLLOW THE RECIPE EXACTLY',
                    bottom: 'AND IT STILL COMES OUT WRONG'
                },
                {
                    prompt: 'A penguin surfing',
                    top: 'LIVING YOUR BEST LIFE',
                    bottom: 'EVEN IF YOU LOOK SILLY'
                }
            ];
            const idea = ideas[Math.floor(Math.random() * ideas.length)];
            elements.prompt.value = idea.prompt;
            elements.topText.value = idea.top;
            elements.bottomText.value = idea.bottom;
            showSuccess('Random idea loaded! Feel free to modify.');
        }

        function downloadMeme() {
            if (!currentMemeUrl) return;
            const a = document.createElement('a');
            a.href = currentMemeUrl;
            a.download = `ai-meme-${Date.now()}.png`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            showSuccess('Meme downloaded!');
        }

        // Event listeners
        elements.generateBtn.addEventListener('click', generateMeme);
        elements.generateCaptionBtn.addEventListener('click', generateCaption);
        elements.randomBtn.addEventListener('click', randomIdea);
        elements.downloadBtn.addEventListener('click', downloadMeme);

        // Enter key in prompt triggers generate
        elements.prompt.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') generateMeme();
        });

        // Initialize
        console.log('AI Meme Generator loaded');
    </script>
</body>
</html>
