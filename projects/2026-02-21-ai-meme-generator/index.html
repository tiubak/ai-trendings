<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Meme Generator | AI Trendings</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #e0e0e0;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #ff6b6b 0%, #feca57 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            text-align: center;
            color: #a0a0a0;
            margin-bottom: 40px;
            font-size: 1.1rem;
        }

        .main-content {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .back-link {
            display: inline-block;
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            margin-bottom: 20px;
        }

        .back-link:hover {
            color: #fff;
        }

        .section {
            margin-bottom: 30px;
        }

        .section h2 {
            font-size: 1.3rem;
            margin-bottom: 15px;
            color: #feca57;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #a0a0a0;
            font-weight: 500;
        }

        .input-group input,
        .input-group select,
        .input-group textarea {
            width: 100%;
            padding: 12px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
            font-family: inherit;
        }

        .input-group input:focus,
        .input-group select:focus,
        .input-group textarea:focus {
            outline: none;
            border-color: #feca57;
            box-shadow: 0 0 10px rgba(254, 202, 87, 0.2);
        }

        .input-group textarea {
            min-height: 100px;
            resize: vertical;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(90deg, #ff6b6b 0%, #feca57 100%);
            border: none;
            border-radius: 8px;
            color: #1a1a2e;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(254, 202, 87, 0.4);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .result-container {
            margin-top: 30px;
            text-align: center;
            display: none;
        }

        .result-container.show {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-image {
            max-width: 100%;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            margin: 20px 0;
        }

        .result-actions {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
        }

        .result-actions button {
            width: auto;
            padding: 12px 24px;
        }

        .button-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .button-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #feca57;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            background: rgba(255, 107, 107, 0.1);
            color: #ff6b6b;
            padding: 16px;
            border-radius: 8px;
            margin-top: 20px;
        }

        .success {
            background: rgba(81, 207, 102, 0.1);
            color: #51cf66;
            padding: 16px;
            border-radius: 8px;
            margin-top: 20px;
        }

        .ideas-container {
            margin-top: 20px;
        }

        .idea-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .idea-buttons button {
            width: auto;
            padding: 10px 16px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="../" class="back-link">← Back to AI Trendings</a>
        
        <h1>🤖 AI Meme Generator</h1>
        <p class="subtitle">Generate hilarious memes using AI — completely free!</p>

        <div class="main-content">
            <div class="section">
                <h2>🎨 Create Your Meme</h2>
                
                <div class="input-group">
                    <label>Image Prompt (optional - leave blank for random idea)</label>
                    <input type="text" id="prompt" placeholder="e.g., A cat in a space suit looking surprised...">
                </div>

                <div class="input-group">
                    <label>Top Caption (optional)</label>
                    <input type="text" id="topText" placeholder="WHEN YOU...">
                </div>

                <div class="input-group">
                    <label>Bottom Caption (optional)</label>
                    <input type="text" id="bottomText" placeholder="AI LEARNS CODE">
                </div>

                <div class="input-group">
                    <label>Image Style</label>
                    <select id="style">
                        <option value="flux">Flux (Default)</option>
                        <option value="turbo">Turbo (Faster)</option>
                        <option value="anime">Anime</option>
                        <option value="realistic">Realistic</option>
                        <option value="fantasy">Fantasy</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Image Size</label>
                    <select id="size">
                        <option value="512">512x512 (Default)</option>
                        <option value="768">768x768</option>
                        <option value="1024">1024x1024</option>
                    </select>
                </div>

                <button id="generateBtn" onclick="generateMeme()">
                    <span id="btnText">Generate Meme</span>
                </button>

                <div id="loading" style="display: none; text-align: center; margin-top: 20px; color: #a0a0a0;">
                    <span class="loading"></span> Generating meme...
                </div>

                <div id="error" style="display: none;"></div>
            </div>

            <div class="section">
                <h2>💡 Random Ideas</h2>
                <div class="ideas-container">
                    <div class="idea-buttons">
                        <button onclick="useIdea('cat')">🐱 Cat</button>
                        <button onclick="useIdea('dog')">🐕 Dog</button>
                        <button onclick="useIdea('space')">🚀 Space</button>
                        <button onclick="useIdea('coding')">💻 Coding</button>
                        <button onclick="useIdea('food')">🍕 Food</button>
                        <button onclick="useIdea('random')">🎲 Random</button>
                    </div>
                </div>
            </div>

            <div id="resultContainer" class="result-container">
                <h2>✨ Your Meme</h2>
                <img id="resultImage" class="result-image" alt="Generated meme">
                <div class="result-actions">
                    <button onclick="downloadMeme()">⬇️ Download PNG</button>
                    <button onclick="generateMeme()" class="button-secondary">🔄 Generate New</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const IDEAS = {
            cat: "A cat in a space suit floating in zero gravity",
            dog: "A dog wearing sunglasses looking cool at a beach",
            space: "An astronaut taking a selfie with Earth in the background",
            coding: "A robot programmer debugging a bug in the matrix",
            food: "A hamburger that looks suspiciously like a donut",
            random: ["A duck solving a complex math equation", "A penguin working as a CEO", "A sloth winning an Olympic race", "A pineapple judging you silently"]
        };

        let currentImageUrl = null;
        let currentImageBlob = null;

        function useIdea(type) {
            if (type === 'random') {
                const ideas = IDEAS.random;
                document.getElementById('prompt').value = ideas[Math.floor(Math.random() * ideas.length)];
            } else {
                document.getElementById('prompt').value = IDEAS[type];
            }
        }

        async function generateMeme() {
            const prompt = document.getElementById('prompt').value.trim();
            const topText = document.getElementById('topText').value.trim();
            const bottomText = document.getElementById('bottomText').value.trim();
            const style = document.getElementById('style').value;
            const size = document.getElementById('size').value;

            // Validation
            if (!prompt && !topText && !bottomText) {
                showError("Please enter at least a prompt or some captions");
                return;
            }

            setLoading(true);
            hideError();

            try {
                // Generate image using Pollinations.AI directly from browser
                const width = parseInt(size);
                const height = parseInt(size);
                
                // Build image URL
                const imagePrompt = prompt || "A funny scene for a meme";
                const imageUrl = `https://gen.pollinations.ai/prompt/${encodeURIComponent(imagePrompt)}?width=${width}&height=${height}&model=${style}&nologo=true&seed=${Math.floor(Math.random() * 1000000)}`;
                
                // Load the image
                const img = new Image();
                img.crossOrigin = "anonymous";
                
                await new Promise((resolve, reject) => {
                    img.onload = resolve;
                    img.onerror = reject;
                    img.src = imageUrl;
                });

                // Create canvas and add captions
                const canvas = document.createElement('canvas');
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                
                // Draw image
                ctx.drawImage(img, 0, 0, width, height);
                
                // Add captions if provided
                if (topText || bottomText) {
                    const fontSize = Math.max(20, height / 15);
                    ctx.font = `bold ${fontSize}px sans-serif`;
                    ctx.textAlign = 'center';
                    
                    // Draw outlined text
                    function drawOutlinedText(text, y) {
                        ctx.strokeStyle = 'black';
                        ctx.lineWidth = 3;
                        ctx.strokeText(text, width / 2, y, fontSize);
                        
                        ctx.fillStyle = 'white';
                        ctx.fillText(text, width / 2, y, fontSize);
                    }
                    
                    if (topText) {
                        drawOutlinedText(topText, fontSize + 10);
                    }
                    
                    if (bottomText) {
                        const textMetrics = ctx.measureText(bottomText);
                        drawOutlinedText(bottomText, height - fontSize - 20);
                    }
                }

                // Convert to blob
                canvas.toBlob((blob) => {
                    currentImageBlob = blob;
                    currentImageUrl = URL.createObjectURL(blob);
                    
                    document.getElementById('resultImage').src = currentImageUrl;
                    document.getElementById('resultContainer').classList.add('show');
                    
                    setLoading(false);
                }, 'image/png');

            } catch (error) {
                console.error('Error generating meme:', error);
                showError("Failed to generate meme: " + error.message);
                setLoading(false);
            }
        }

        function downloadMeme() {
            if (!currentImageBlob) {
                showError("No meme to download");
                return;
            }

            const link = document.createElement('a');
            link.href = currentImageUrl;
            link.download = `meme-${Date.now()}.png`;
            link.click();
        }

        function setLoading(loading) {
            document.getElementById('loading').style.display = loading ? 'block' : 'none';
            document.getElementById('generateBtn').disabled = loading;
            document.getElementById('btnText').textContent = loading ? 'Generating...' : 'Generate Meme';
        }

        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.innerHTML = `<div class="error">❌ ${message}</div>`;
            errorDiv.style.display = 'block';
        }

        function hideError() {
            document.getElementById('error').style.display = 'none';
        }
    </script>
</body>
</html>
