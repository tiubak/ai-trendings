<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Compliment Generator - 2026-02-11</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Nunito', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fecfef 100%);
            min-height: 100vh;
            padding: 20px;
            color: #444;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            text-align: center;
            color: #d6336c;
            margin-bottom: 8px;
            font-size: 2.5rem;
            text-shadow: 0 2px 10px rgba(214, 51, 108, 0.2);
        }

        .subtitle {
            text-align: center;
            color: #e85d75;
            margin-bottom: 40px;
            font-size: 1.2rem;
        }

        .mode-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
        }

        .mode-tab {
            flex: 1;
            padding: 14px;
            background: white;
            border: 2px solid rgba(214, 51, 108, 0.3);
            border-radius: 12px;
            color: #d6336c;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s;
            font-weight: 600;
        }

        .mode-tab.active {
            background: #d6336c;
            color: white;
            border-color: #d6336c;
        }

        .mode-tab:hover:not(.active) {
            background: rgba(214, 51, 108, 0.1);
        }

        .control-panel {
            background: white;
            border-radius: 16px;
            padding: 28px;
            margin-bottom: 32px;
            box-shadow: 0 10px 40px rgba(214, 51, 108, 0.2);
        }

        .section {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #d6336c;
        }

        input[type="text"], select {
            width: 100%;
            padding: 12px;
            border: 2px solid #f8d0e4;
            border-radius: 10px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus, select:focus {
            outline: none;
            border-color: #d6336c;
        }

        select {
            cursor: pointer;
        }

        .row {
            display: flex;
            gap: 16px;
        }

        .row .section {
            flex: 1;
        }

        .btn {
            background: linear-gradient(135deg, #d6336c, #e85d75);
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
            margin-top: 12px;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(214, 51, 108, 0.4);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            margin-top: 10px;
        }

        .results {
            background: white;
            border-radius: 16px;
            padding: 28px;
            box-shadow: 0 10px 40px rgba(214, 51, 108, 0.2);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .results-header {
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 2px solid #f8d0e4;
        }

        .results-title {
            color: #d6336c;
            font-size: 1.5rem;
            margin-bottom: 4px;
        }

        .results-meta {
            color: #888;
            font-size: 0.95rem;
        }

        .compliment-card {
            background: linear-gradient(135deg, rgba(214, 51, 108, 0.05), rgba(232, 93, 117, 0.05));
            border: 2px solid #f8d0e4;
            border-radius: 12px;
            padding: 24px;
            margin: 16px 0;
            position: relative;
            transition: transform 0.3s;
        }

        .compliment-card:hover {
            transform: scale(1.02);
            border-color: #d6336c;
        }

        .compliment-text {
            font-size: 1.6rem;
            color: #d6336c;
            line-height: 1.5;
            font-weight: 600;
            margin-bottom: 16px;
            font-style: italic;
        }

        .compliment-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 12px;
        }

        .meta-badge {
            background: #f8d0e4;
            color: #d6336c;
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .sincerity-bar {
            margin-top: 12px;
        }

        .sincerity-label {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 4px;
        }

        .sincerity-fill {
            height: 8px;
            background: linear-gradient(90deg, #ffe6ea, #d6336c);
            border-radius: 4px;
        }

        .hidden {
            display: none;
        }

        .message {
            text-align: center;
            padding: 40px;
            color: #d6336c;
            font-size: 1.2rem;
        }

        .batch-grid {
            display: grid;
            gap: 12px;
        }

        @media (max-width: 600px) {
            .mode-tabs {
                flex-direction: column;
            }
            .row {
                flex-direction: column;
            }
            h1 {
                font-size: 2rem;
            }
            .compliment-text {
                font-size: 1.3rem;
            }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h1>AI Compliment Generator</h1>
        <p class="subtitle">Spread kindness with perfectly crafted compliments</p>

        <div class="mode-tabs">
            <div class="mode-tab active" onclick="setMode('single')" id="tabSingle">Single Compliment</div>
            <div class="mode-tab" onclick="setMode('personalize')" id="tabPersonalize">Personalize</div>
            <div class="mode-tab" onclick="setMode('batch')" id="tabBatch">Random Batch</div>
        </div>

        <div class="control-panel">
            <!-- Single Mode -->
            <div id="singleMode">
                <div class="row">
                    <div class="section">
                        <label for="category">Category</label>
                        <select id="category">
                            <option value="general">General</option>
                            <option value="appearance">Appearance</option>
                            <option value="personality">Personality</option>
                            <option value="skills">Skills/Talent</option>
                            <option value="effort">Effort/Work Ethic</option>
                            <option value="character">Character</option>
                            <option value="creativity">Creativity</option>
                            <option value="intelligence">Intelligence</option>
                        </select>
                    </div>
                    <div class="section">
                        <label for="gender">Recipient Gender</label>
                        <select id="gender">
                            <option value="any">Any</option>
                            <option value="female">Female</option>
                            <option value="male">Male</option>
                        </select>
                    </div>
                </div>
                <div class="section">
                    <label for="tone">Tone</label>
                    <select id="tone">
                        <option value="warm">Warm & Friendly</option>
                        <option value="sincere">Sincere</option>
                        <option value="playful">Playful</option>
                        <option value="enthusiastic">Enthusiastic</option>
                        <option value="respectful">Respectful</option>
                    </select>
                </div>
            </div>

            <!-- Personalize Mode -->
            <div id="personalizeMode" class="hidden">
                <div class="section">
                    <label for="baseCompliment">Base Compliment</label>
                    <textarea id="baseCompliment" style="min-height: 80px;" placeholder="Enter a compliment to personalize..."></textarea>
                </div>
                <div class="row">
                    <div class="section">
                        <label for="recipientName">Recipient's Name</label>
                        <input type="text" id="recipientName" placeholder="e.g., Sarah, Alex, Mom">
                    </div>
                    <div class="section">
                        <label for="context">Context (optional)</label>
                        <input type="text" id="context" placeholder="e.g., after their presentation, on their birthday">
                    </div>
                </div>
            </div>

            <!-- Batch Mode -->
            <div id="batchMode" class="hidden">
                <div class="section">
                    <label for="batchCount">Number of Compliments</label>
                    <select id="batchCount">
                        <option value="3">3 Compliments</option>
                        <option value="5" selected>5 Compliments</option>
                        <option value="8">8 Compliments</option>
                    </select>
                </div>
                <p style="color: #888; font-size: 0.9rem; margin-top: 8px;">Generates a variety of random compliments from different categories.</p>
            </div>

            <button class="btn" onclick="generate()">Generate Compliment</button>
            <button class="btn btn-secondary" onclick="startOver()">Reset</button>
        </div>

        <div id="loading" class="hidden message">
            <p>Crafting kind words...</p>
        </div>

        <div id="results" class="results hidden">
            <div class="results-header" id="resultsHeader"></div>

            <div id="complimentContent"></div>
        </div>
    </div>

    <script>
        const API_URL = '/api/2026-02-11-ai-compliment-generator';
        let currentMode = 'single';

        function setMode(mode) {
            currentMode = mode;
            document.getElementById('singleMode').classList.add('hidden');
            document.getElementById('personalizeMode').classList.add('hidden');
            document.getElementById('batchMode').classList.add('hidden');

            document.querySelectorAll('.mode-tab').forEach(tab => tab.classList.remove('active'));
            document.getElementById(`tab${mode.charAt(0).toUpperCase() + mode.slice(1)}`).classList.add('active');

            if (mode === 'single') {
                document.getElementById('singleMode').classList.remove('hidden');
            } else if (mode === 'personalize') {
                document.getElementById('personalizeMode').classList.remove('hidden');
            } else if (mode === 'batch') {
                document.getElementById('batchMode').classList.remove('hidden');
            }
        }

        async function generate() {
            let request;

            if (currentMode === 'single') {
                request = {
                    action: 'generate',
                    category: document.getElementById('category').value,
                    recipient_gender: document.getElementById('gender').value,
                    tone: document.getElementById('tone').value
                };
            } else if (currentMode === 'personalize') {
                const base = document.getElementById('baseCompliment').value.trim();
                const name = document.getElementById('recipientName').value.trim();
                if (!base || !name) {
                    alert('Please enter both a compliment and a name.');
                    return;
                }
                request = {
                    action: 'personalize',
                    base_compliment: base,
                    recipient_name: name,
                    context: document.getElementById('context').value.trim()
                };
            } else if (currentMode === 'batch') {
                request = {
                    action: 'random',
                    count: parseInt(document.getElementById('batchCount').value)
                };
            }

            document.querySelector('.control-panel').style.opacity = '0.6';
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('results').classList.add('hidden');

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(request)
                });
                const result = await response.json();

                displayResults(result, currentMode);
            } catch (error) {
                console.error(error);
                alert('Network error. Please try again.');
            }

            document.getElementById('loading').classList.add('hidden');
            document.querySelector('.control-panel').style.opacity = '1';
        }

        function displayResults(result, mode) {
            document.getElementById('results').classList.remove('hidden');
            const header = document.getElementById('resultsHeader');
            const content = document.getElementById('complimentContent');

            content.innerHTML = '';

            if (mode === 'single') {
                header.innerHTML = `
                    <div class="results-title">Your Compliment</div>
                    <div class="results-meta">Category: ${result.category} • Tone: ${result.compliment.tone}</div>
                `;

                const comp = result.compliment;
                const card = document.createElement('div');
                card.className = 'compliment-card';
                card.innerHTML = `
                    <div class="compliment-text">"${comp.compliment}"</div>
                    <div class="compliment-meta">
                        <span class="meta-badge">${comp.tone} tone</span>
                        <span class="meta-badge">Sincerity: ${comp.sincerity_level}/10</span>
                        <span class="meta-badge">${comp.category}</span>
                    </div>
                    ${comp.best_for ? `<div class="sincerity-label"><strong>Best for:</strong> ${comp.best_for}</div>` : ''}
                    ${comp.follow_up ? `<div class="sincerity-label" style="margin-top:8px;"><em>${comp.follow_up}</em></div>` : ''}
                `;
                content.appendChild(card);

            } else if (mode === 'personalize') {
                header.innerHTML = `
                    <div class="results-title">Personalized Compliment</div>
                    <div class="results-meta">For ${result.recipient_name}</div>
                `;

                const pers = result.personalized;
                const card = document.createElement('div');
                card.className = 'compliment-card';
                card.innerHTML = `
                    <div class="compliment-text">"${pers.personalized}"</div>
                    <div class="compliment-meta">
                        <span class="meta-badge">${pers.personalization_level} personalization</span>
                    </div>
                    <div class="sincerity-label" style="margin-top:12px;">
                        <strong>Why it works:</strong> ${pers.why_personal}
                    </div>
                    <div class="sincerity-label" style="margin-top:8px; font-style:italic; color:#888;">
                        Original: "${pers.original}"
                    </div>
                `;
                content.appendChild(card);

            } else if (mode === 'batch') {
                header.innerHTML = `
                    <div class="results-title">Random Compliment Batch</div>
                    <div class="results-meta">${result.batch_size} compliments to spread kindness</div>
                `;

                const list = document.createElement('div');
                list.className = 'batch-grid';

                result.compliments.forEach((comp, i) => {
                    const card = document.createElement('div');
                    card.className = 'compliment-card';
                    card.style.animationDelay = `${i * 0.1}s`;
                    card.innerHTML = `
                        <div class="compliment-text" style="font-size:1.3rem;">"${comp.compliment || ''}"</div>
                        <div class="compliment-meta">
                            <span class="meta-badge">${comp.category}</span>
                            <span class="meta-badge">${comp.tone}</span>
                        </div>
                        <div class="sincerity-label" style="margin-top:8px;">
                            <strong>Use when:</strong> ${comp.when_to_use || 'Anytime you want to be kind'}
                        </div>
                    `;
                    list.appendChild(card);
                });

                content.appendChild(list);
            }
        }

        function startOver() {
            document.getElementById('results').classList.add('hidden');
            document.getElementById('category').value = 'general';
            document.getElementById('gender').value = 'any';
            document.getElementById('tone').value = 'warm';
            document.getElementById('baseCompliment').value = '';
            document.getElementById('recipientName').value = '';
            document.getElementById('context').value = '';
        }
    </script>
</body>
</html>
