<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Cosmic Whisperer | AI Trendings</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: radial-gradient(ellipse at bottom, #1b2735 0%, #090a0f 100%);
            color: #e0e0e0;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }
        
        /* Stars background */
        .stars {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--duration) ease-in-out infinite;
            opacity: var(--opacity);
        }
        @keyframes twinkle {
            0%, 100% { opacity: var(--opacity); transform: scale(1); }
            50% { opacity: calc(var(--opacity) * 0.3); transform: scale(0.8); }
        }
        
        .container {
            position: relative;
            z-index: 1;
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        
        .back-link {
            color: rgba(255,255,255,0.6);
            text-decoration: none;
            font-size: 0.9rem;
            margin-bottom: 20px;
            display: inline-block;
            transition: color 0.3s;
        }
        .back-link:hover { color: #a78bfa; }
        
        .header {
            text-align: center;
            margin-bottom: 50px;
        }
        .header h1 {
            font-size: 3rem;
            background: linear-gradient(135deg, #a78bfa 0%, #60a5fa 50%, #34d399 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            text-shadow: 0 0 40px rgba(167, 139, 250, 0.3);
        }
        .header p {
            color: rgba(255,255,255,0.7);
            font-size: 1.1rem;
        }
        
        .form-section, .result-section {
            background: rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            margin-bottom: 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #a78bfa;
            font-weight: 500;
            font-size: 0.95rem;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 14px;
            border: 1px solid rgba(167, 139, 250, 0.3);
            border-radius: 10px;
            background: rgba(0,0,0,0.3);
            color: #fff;
            font-size: 1rem;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #a78bfa;
            box-shadow: 0 0 0 3px rgba(167, 139, 250, 0.2);
        }
        .form-group select option {
            background: #1b2735;
        }
        
        .buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        button {
            flex: 1;
            min-width: 200px;
            padding: 15px 25px;
            background: linear-gradient(135deg, #a78bfa, #6366f1);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.3s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(167, 139, 250, 0.4);
        }
        button:active { transform: translateY(0); }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        button.secondary {
            background: linear-gradient(135deg, #60a5fa, #3b82f6);
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: rgba(255,255,255,0.7);
        }
        .spinner {
            width: 50px; height: 50px;
            border: 3px solid rgba(167, 139, 250, 0.3);
            border-top-color: #a78bfa;
            border-radius: 50%;
            margin: 0 auto 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .message-card {
            background: rgba(0,0,0,0.2);
            border-radius: 16px;
            padding: 30px;
            border: 1px solid rgba(255,255,255,0.1);
            animation: fadeIn 0.8s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .theme-badge, .tone-badge {
            background: rgba(167, 139, 250, 0.2);
            color: #c4b5fd;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 500;
        }
        .message-content {
            font-size: 1.2rem;
            line-height: 1.8;
            color: #f0f0f0;
            margin-bottom: 30px;
            white-space: pre-wrap;
            text-shadow: 0 0 10px rgba(255,255,255,0.1);
        }
        .keywords {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .keyword {
            background: rgba(96, 165, 250, 0.15);
            color: #93c5fd;
            padding: 6px 12px;
            border-radius: 15px;
            font-size: 0.85rem;
        }
        .affirmation {
            text-align: center;
            font-style: italic;
            color: #a78bfa;
            padding: 20px;
            background: rgba(167, 139, 250, 0.1);
            border-radius: 12px;
            border-left: 3px solid #a78bfa;
            font-size: 1.1rem;
        }
        .date-display {
            text-align: center;
            color: rgba(255,255,255,0.6);
            margin-bottom: 15px;
            font-size: 0.95rem;
        }
        
        .hidden { display: none; }
        
        @media (max-width: 600px) {
            .header h1 { font-size: 2rem; }
            .form-section, .result-section { padding: 20px; }
            .message-content { font-size: 1.1rem; }
        }
    </style>
</head>
<body>
    <!-- Stars will be generated here -->
    <div class="stars" id="stars"></div>
    
    <div class="container">
        <a href="../../" class="back-link">← Back to AI Trendings</a>
        
        <div class="header">
            <h1>🌌 AI Cosmic Whisperer</h1>
            <p>Receive mystical messages from the stars and galaxies</p>
        </div>
        
        <div class="form-section" id="form-section">
            <div class="form-group">
                <label for="name">Your Name (optional)</label>
                <input type="text" id="name" placeholder="e.g., Stardust Seeker">
            </div>
            
            <div class="form-group">
                <label for="theme">Theme of Inquiry</label>
                <select id="theme">
                    <option value="general">General Guidance</option>
                    <option value="love">Love & Relationships</option>
                    <option value="career">Career & Purpose</option>
                    <option value="health">Health & Vitality</option>
                    <option value="spiritual">Spiritual Journey</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="tone">Message Tone</label>
                <select id="tone">
                    <option value="mystical">Mystical & Ethereal</option>
                    <option value="direct">Direct & Clear</option>
                    <option value="comforting">Comforting & Soothing</option>
                </select>
            </div>
            
            <div class="buttons">
                <button onclick="generateMessage()">✨ Receive Cosmic Message</button>
                <button class="secondary" onclick="getDailyReading()">📖 Today's Cosmic Reading</button>
            </div>
        </div>
        
        <div class="result-section hidden" id="result-section">
            <div id="loading" class="loading hidden">
                <div class="spinner"></div>
                <p>Consulting the stars...</p>
            </div>
            
            <div id="message-card" class="message-card hidden">
                <div class="message-header">
                    <span class="theme-badge" id="theme-badge">Theme</span>
                    <span class="tone-badge" id="tone-badge">Tone</span>
                </div>
                
                <div class="date-display hidden" id="date-display"></div>
                
                <div class="message-content" id="message-content"></div>
                
                <div class="keywords" id="keywords"></div>
                
                <div class="affirmation" id="affirmation"></div>
            </div>
            
            <div class="buttons" style="margin-top: 20px;">
                <button onclick="resetForm()">🔮 Ask Another Question</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = '/api/2026-02-20-ai-cosmic-whisperer';
        
        async function apiCall(action, data = {}) {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action, ...data })
            });
            return response.json();
        }
        
        function showLoading() {
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('message-card').classList.add('hidden');
            const btns = document.querySelectorAll('button');
            btns.forEach(b => b.disabled = true);
        }
        
        function hideLoading() {
            document.getElementById('loading').classList.add('hidden');
            const btns = document.querySelectorAll('button');
            btns.forEach(b => b.disabled = false);
        }
        
        function showResult() {
            document.getElementById('form-section').classList.add('hidden');
            document.getElementById('result-section').classList.remove('hidden');
            document.getElementById('message-card').classList.remove('hidden');
        }
        
        async function generateMessage() {
            const name = document.getElementById('name').value.trim();
            const theme = document.getElementById('theme').value;
            const tone = document.getElementById('tone').value;
            
            showLoading();
            
            try {
                const result = await apiCall('start', { name, theme, tone });
                displayResult(result, false);
            } catch (error) {
                console.error(error);
                alert('Failed to receive cosmic message. Please try again.');
                hideLoading();
            }
        }
        
        async function getDailyReading() {
            showLoading();
            
            try {
                const result = await apiCall('daily');
                displayResult(result, true);
            } catch (error) {
                console.error(error);
                alert('Failed to get daily reading. Please try again.');
                hideLoading();
            }
        }
        
        function displayResult(data, isDaily) {
            hideLoading();
            showResult();
            
            // Theme and tone badges
            document.getElementById('theme-badge').textContent = 
                data.theme ? data.theme.replace('_', ' ') : 'Cosmic';
            document.getElementById('tone-badge').textContent = 
                data.tone ? data.tone.charAt(0).toUpperCase() + data.tone.slice(1) : 'Mystical';
            
            // Date display for daily reading
            const dateEl = document.getElementById('date-display');
            if (isDaily && data.date) {
                dateEl.textContent = data.date;
                dateEl.classList.remove('hidden');
            } else {
                dateEl.classList.add('hidden');
            }
            
            // Message
            document.getElementById('message-content').textContent = data.message || 'The cosmos is quiet today...';
            
            // Keywords
            const keywordsEl = document.getElementById('keywords');
            keywordsEl.innerHTML = '';
            if (data.key_words && Array.isArray(data.key_words)) {
                data.key_words.forEach(kw => {
                    const span = document.createElement('span');
                    span.className = 'keyword';
                    span.textContent = kw;
                    keywordsEl.appendChild(span);
                });
            }
            
            // Affirmation
            const affEl = document.getElementById('affirmation');
            if (data.affirmation) {
                affEl.textContent = `Affirmation: "${data.affirmation}"`;
                affEl.style.display = 'block';
            } else {
                affEl.style.display = 'none';
            }
        }
        
        function resetForm() {
            document.getElementById('result-section').classList.add('hidden');
            document.getElementById('form-section').classList.remove('hidden');
            document.getElementById('name').value = '';
        }
        
        // Generate star field
        function createStars() {
            const starsEl = document.getElementById('stars');
            const numStars = 150;
            
            for (let i = 0; i < numStars; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                
                const size = Math.random() * 2 + 1;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                
                star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
                star.style.setProperty('--opacity', Math.random() * 0.7 + 0.3);
                
                star.style.animationDelay = Math.random() * 5 + 's';
                
                starsEl.appendChild(star);
            }
        }
        
        // Initialize
        createStars();
    </script>
</body>
</html>
