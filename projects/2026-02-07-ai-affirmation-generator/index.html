<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Affirmation Generator - 2026-02-07</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Nunito', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #1a1a2e;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(15px);
            border-radius: 24px;
            padding: 48px;
            max-width: 850px;
            width: 100%;
            box-shadow: 0 25px 80px rgba(17, 153, 142, 0.3);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            text-align: center;
            color: #11998e;
            margin-bottom: 12px;
            font-size: 2.4rem;
            font-weight: 700;
        }

        .subtitle {
            text-align: center;
            color: #38ef7d;
            margin-bottom: 40px;
            font-size: 1.2rem;
        }

        .section {
            margin-bottom: 24px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #11998e;
        }

        input[type="text"], select, textarea {
            width: 100%;
            padding: 14px;
            background: rgba(245, 245, 245, 0.8);
            border: 2px solid #b8e6de;
            border-radius: 12px;
            font-size: 1rem;
            color: #333;
            transition: all 0.3s;
        }

        input[type="text"]:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #11998e;
            box-shadow: 0 0 20px rgba(17, 153, 142, 0.2);
        }

        .row {
            display: flex;
            gap: 16px;
        }

        .row .section {
            flex: 1;
        }

        select {
            cursor: pointer;
        }

        select option {
            background: white;
            color: #333;
        }

        .btn {
            background: linear-gradient(135deg, #11998e, #38ef7d);
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
            margin-top: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(17, 153, 142, 0.4);
        }

        .btn:active {
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            text-transform: none;
            margin-top: 10px;
        }

        .affirmation-card {
            background: rgba(255, 255, 255, 1);
            border: 3px solid #11998e;
            border-radius: 20px;
            padding: 40px;
            margin: 20px 0;
            animation: slideUp 0.6s ease-out;
            box-shadow: 0 10px 40px rgba(17, 153, 142, 0.2);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .affirmation-text {
            font-size: 1.8rem;
            line-height: 1.6;
            text-align: center;
            color: #11998e;
            margin-bottom: 24px;
            font-weight: 700;
        }

        .affirmation-meta {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-top: 16px;
        }

        .meta-item {
            background: linear-gradient(135deg, #11998e, #38ef7d);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .keywords-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-top: 16px;
        }

        .keyword {
            background: rgba(17, 153, 142, 0.2);
            color: #11998e;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .usage-tip {
            margin-top: 20px;
            padding: 16px;
            background: rgba(17, 153, 142, 0.1);
            border-radius: 10px;
            text-align: center;
            color: #333;
        }

        .hidden {
            display: none;
        }

        .message {
            text-align: center;
            padding: 20px;
            color: #11998e;
            font-style: italic;
        }

        .daily-section {
            margin-top: 24px;
        }

        .daily-affirmation {
            background: linear-gradient(135deg, rgba(17,153,142,0.1), rgba(56,239,125,0.1));
            padding: 16px;
            border-left: 4px solid #11998e;
            margin: 12px 0;
            border-radius: 0 8px 8px 0;
        }

        .daily-area {
            font-weight: 700;
            color: #11998e;
            margin-bottom: 8px;
            font-size: 1rem;
        }

        .daily-text {
            font-size: 1.3rem;
            color: #1a1a2e;
            line-height: 1.5;
        }

        .breath-info {
            text-align: right;
            color: #38ef7d;
            font-size: 0.85rem;
            margin-top: 8px;
        }

        .intro {
            text-align: center;
            margin-bottom: 24px;
            color: #555;
            font-size: 1.1rem;
        }

        textarea {
            min-height: 120px;
            resize: vertical;
        }

        @media (max-width: 600px) {
            .container {
                padding: 28px;
            }
            h1 {
                font-size: 2rem;
            }
            .affirmation-text {
                font-size: 1.4rem;
            }
            .row {
                flex-direction: column;
            }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h1>AI Affirmation Generator</h1>
        <p class="subtitle">Empower your mind with positive affirmations</p>

        <div id="inputSection">
            <p class="intro">Create personalized affirmations to cultivate positive beliefs and transform your mindset.</p>

            <div class="section">
                <label for="mode">Mode</label>
                <select id="mode" onchange="toggleMode()">
                    <option value="single">Single Affirmation</option>
                    <option value="personalize">Personalize for Someone</option>
                    <option value="daily">Daily Affirmation Set</option>
                </select>
            </div>

            <div id="singleMode">
                <div class="row">
                    <div class="section">
                        <label for="focusArea">Focus Area</label>
                        <input type="text" id="focusArea" placeholder="e.g., self-love, confidence, abundance...">
                    </div>
                    <div class="section">
                        <label for="intensity">Intensity</label>
                        <select id="intensity">
                            <option value="gentle">Gentle</option>
                            <option value="moderate" selected>Moderate</option>
                            <option value="powerful">Powerful</option>
                        </select>
                    </div>
                </div>
                <div class="row">
                    <div class="section">
                        <label for="duration">Duration</label>
                        <select id="duration">
                            <option value="short">Short (1 sentence)</option>
                            <option value="medium" selected>Medium (2-3 sentences)</option>
                            <option value="long">Long (paragraph)</option>
                        </select>
                    </div>
                </div>
            </div>

            <div id="personalizeMode" class="hidden">
                <div class="section">
                    <label for="baseAffirmation">Base Affirmation</label>
                    <textarea id="baseAffirmation" placeholder="Enter the affirmation you want to personalize..."></textarea>
                </div>
                <div class="section">
                    <label for="personName">Person's Name</label>
                    <input type="text" id="personName" placeholder="e.g., Sarah, Alex, Mom">
                </div>
                <div class="section">
                    <label for="personalDetails">Personal Details (optional)</label>
                    <input type="text" id="personalDetails" placeholder="e.g., going through a tough time, starting new job...">
                </div>
            </div>

            <button class="btn" onclick="generate()" id="generateBtn">Generate Affirmation</button>
        </div>

        <div id="singleResults" class="hidden">
            <div class="affirmation-card">
                <div class="affirmation-text" id="affirmationText"></div>
                <div class="affirmation-meta">
                    <span class="meta-item" id="focusDisplay"></span>
                    <span class="meta-item" id="intensityDisplay"></span>
                </div>
                <div class="keywords-container" id="keywordsContainer"></div>
                <div class="usage-tip" id="usageTip"></div>
            </div>
            <button class="btn btn-secondary" onclick="generateAnother()">Generate Another</button>
            <button class="btn" onclick="goToPersonalize()">Personalize This</button>
            <button class="btn" style="background: linear-gradient(135deg, #667eea, #764ba2);" onclick="makeDaily()">Add to Daily Set</button>
        </div>

        <div id="personalizedResults" class="hidden">
            <div class="affirmation-card" style="border-color: #f093fb;">
                <div class="affirmation-text" id="personalizedText" style="color: #f093fb;"></div>
                <div class="usage-tip">
                    <strong>Changes made:</strong> <span id="changesList"></span>
                </div>
                <div class="usage-tip">
                    <em><span id="whyPersonal"></span></em>
                </div>
            </div>
            <button class="btn btn-secondary" onclick="backToInput()">Back to Menu</button>
        </div>

        <div id="dailyResults" class="hidden">
            <div class="daily-section">
                <h2 style="text-align: center; margin-bottom: 24px; color: #11998e;">Your Daily Affirmation Set</h2>
                <div id="dailyList"></div>
            </div>
            <button class="btn btn-secondary" onclick="startOver()">Back to Menu</button>
        </div>

        <div id="loading" class="hidden message">
            <p>Creating empowering affirmations...</p>
        </div>
    </div>

    <script>
        const API_URL = '/api/2026-02-07-ai-affirmation-generator';
        let currentAffirmation = null;

        async function apiCall(action, data = {}) {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action, ...data })
            });
            return response.json();
        }

        function toggleMode() {
            const mode = document.getElementById('mode').value;
            document.getElementById('singleMode').classList.add('hidden');
            document.getElementById('personalizeMode').classList.add('hidden');
            document.getElementById('singleResults').classList.add('hidden');
            document.getElementById('personalizedResults').classList.add('hidden');

            if (mode === 'single') {
                document.getElementById('singleMode').classList.remove('hidden');
            } else if (mode === 'personalize') {
                document.getElementById('personalizeMode').classList.remove('hidden');
            }
        }

        async function generate() {
            const mode = document.getElementById('mode').value;
            let request, requestAction;

            if (mode === 'single') {
                const focus = document.getElementById('focusArea').value.trim();
                if (!focus) {
                    alert('Please enter a focus area.');
                    return;
                }
                request = {
                    action: 'generate',
                    focus_area: focus,
                    intensity: document.getElementById('intensity').value,
                    duration: document.getElementById('duration').value
                };
                requestAction = 'generate';
            } else if (mode === 'personalize') {
                const base = document.getElementById('baseAffirmation').value.trim();
                const name = document.getElementById('personName').value.trim();
                if (!base || !name) {
                    alert('Please enter both an affirmation and a name.');
                    return;
                }
                request = {
                    action: 'personalize',
                    base_affirmation: base,
                    name: name,
                    personal_details: document.getElementById('personalDetails').value.trim()
                };
                requestAction = 'personalize';
            }

            document.getElementById('inputSection').classList.add('hidden');
            document.getElementById('loading').classList.remove('hidden');

            try {
                const result = await apiCall(requestAction, request);
                document.getElementById('loading').classList.add('hidden');

                if (mode === 'single' && result.affirmation) {
                    currentAffirmation = result.affirmation;
                    displaySingle(result.affirmation);
                    document.getElementById('singleResults').classList.remove('hidden');
                } else if (mode === 'personalize' && result.personalized) {
                    displayPersonalized(result.personalized);
                    document.getElementById('personalizedResults').classList.remove('hidden');
                }
            } catch (error) {
                console.error(error);
                alert('Network error. Please try again.');
                document.getElementById('inputSection').classList.remove('hidden');
                document.getElementById('loading').classList.add('hidden');
            }
        }

        function displaySingle(aff) {
            document.getElementById('affirmationText').textContent = aff.affirmation || '';
            document.getElementById('focusDisplay').textContent = aff.focus_area || 'General';
            document.getElementById('intensityDisplay').textContent = aff.intensity || 'Moderate';

            const keywordsContainer = document.getElementById('keywordsContainer');
            keywordsContainer.innerHTML = '';
            (aff.keywords || []).forEach(kw => {
                keywordsContainer.innerHTML += `<span class="keyword">${kw}</span>`;
            });

            document.getElementById('usageTip').innerHTML = `<strong>💡 Suggestion:</strong> ${aff.suggested_usage || 'Repeat daily for best results.'}`;
        }

        function displayPersonalized(pers) {
            document.getElementById('personalizedText').textContent = pers.personalized || '';
            document.getElementById('changesList').textContent = (pers.changes_made || []).join(', ');
            document.getElementById('whyPersonal').textContent = pers.why_personal || '';
        }

        function generateAnother() {
            document.getElementById('singleResults').classList.add('hidden');
            document.getElementById('inputSection').classList.remove('hidden');
        }

        function goToPersonalize() {
            document.getElementById('singleResults').classList.add('hidden');
            document.getElementById('mode').value = 'personalize';
            toggleMode();
            document.getElementById('baseAffirmation').value = currentAffirmation ? currentAffirmation.affirmation : '';
        }

        function backToInput() {
            document.getElementById('personalizedResults').classList.add('hidden');
            document.getElementById('inputSection').classList.remove('hidden');
        }

        async function makeDaily() {
            // Simulate creating a daily set with this affirmation
            const affirmationText = currentAffirmation ? currentAffirmation.affirmation : '';
            if (!affirmationText) return;

            // For demo, just show that it would be added
            alert('In a full version, this would add to your daily set! For now, try "Daily Affirmation Set" mode to see a complete set.');
        }

        async function generateDaily() {
            document.getElementById('inputSection').classList.add('hidden');
            document.getElementById('loading').classList.remove('hidden');

            try {
                const result = await apiCall('daily_affirmations');
                document.getElementById('loading').classList.add('hidden');

                displayDaily(result.daily_set);
                document.getElementById('dailyResults').classList.remove('hidden');
            } catch (error) {
                console.error(error);
                alert('Network error.');
                document.getElementById('inputSection').classList.remove('hidden');
                document.getElementById('loading').classList.add('hidden');
            }
        }

        function displayDaily(affirmations) {
            const list = document.getElementById('dailyList');
            list.innerHTML = '';

            (affirmations || []).forEach((item, index) => {
                list.innerHTML += `
                    <div class="daily-affirmation" style="animation-delay: ${index * 0.1}s;">
                        <div class="daily-area">${item.area || 'Area'}</div>
                        <div class="daily-text">${item.affirmation || ''}</div>
                        <div class="breath-info">Repeat ${item.breath_count || 3} times</div>
                    </div>
                `;
            });
        }

        function startOver() {
            document.getElementById('dailyResults').classList.add('hidden');
            document.getElementById('inputSection').classList.remove('hidden');
            document.getElementById('mode').value = 'single';
            toggleMode();
        }
    </script>
</body>
</html>
