<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Dungeon Master | AI Trendings</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 30px;
            backdrop-filter: blur(10px);
        }
        h1 { text-align: center; color: #00d4aa; margin-bottom: 10px; }
        .subtitle { text-align: center; color: rgba(255,255,255,0.7); margin-bottom: 30px; }
        .back-link { color: rgba(255,255,255,0.7); text-decoration: none; }
        .back-link:hover { color: #fff; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: rgba(255,255,255,0.9); }
        .form-group input, .form-group select {
            width: 100%; padding: 12px; border: 1px solid rgba(255,255,255,0.2);
            border-radius: 6px; background: rgba(0,0,0,0.3); color: #fff; font-size: 1rem;
        }
        button {
            width: 100%; padding: 14px; background: linear-gradient(135deg, #00d4aa, #00d4ff);
            border: none; border-radius: 6px; color: #fff; font-size: 1.1rem; font-weight: 600;
            cursor: pointer; transition: transform 0.2s;
        }
        button:hover { transform: translateY(-2px); }
        button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .scene { background: rgba(0,0,0,0.2); border-radius: 8px; padding: 20px; margin-bottom: 20px; white-space: pre-wrap; line-height: 1.6; }
        .choices { display: flex; flex-direction: column; gap: 10px; }
        .choice-btn {
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            border-radius: 6px; padding: 12px; color: #fff; cursor: pointer; transition: all 0.2s; text-align: left;
        }
        .choice-btn:hover { background: rgba(255,255,255,0.2); }
        .hidden { display: none; }
        .error { background: rgba(255,82,82,0.1); border: 1px solid rgba(255,82,82,0.3); padding: 12px; border-radius: 6px; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <a href="../" class="back-link">← Back to Projects</a>
        <h1>🎲 AI Dungeon Master</h1>
        <p class="subtitle">Interactive storytelling powered by AI</p>
        
        <div id="setup-form">
            <div class="form-group">
                <label for="theme">Adventure Theme</label>
                <select id="theme">
                    <option value="fantasy">Fantasy</option>
                    <option value="sci-fi">Sci-Fi</option>
                    <option value="horror">Horror</option>
                    <option value="mystery">Mystery</option>
                </select>
            </div>
            <div class="form-group">
                <label for="setting">Starting Location</label>
                <input type="text" id="setting" placeholder="e.g., ancient ruins, space station, haunted mansion" value="mysterious dungeon">
            </div>
            <button onclick="startGame()">Begin Adventure</button>
        </div>
        
        <div id="game-area" class="hidden">
            <div id="scene" class="scene"></div>
            <div id="choices" class="choices"></div>
        </div>
        
        <div id="error" class="error hidden"></div>
    </div>

    <script>
        const API_URL = '/api/2026-02-21-ai-dungeon-master';
        let gameState = null;

        async function apiCall(action, data = {}) {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action, ...data })
            });
            return response.json();
        }

        async function startGame() {
            const theme = document.getElementById('theme').value;
            const setting = document.getElementById('setting').value;
            
            document.querySelector('button').disabled = true;
            document.querySelector('button').textContent = 'Generating...';
            
            try {
                gameState = await apiCall('start', { theme, setting });
                displayGame();
            } catch (error) {
                showError(error.message);
            }
            
            document.querySelector('button').disabled = false;
            document.querySelector('button').textContent = 'Begin Adventure';
        }

        async function makeChoice(choice) {
            const buttons = document.querySelectorAll('.choice-btn');
            buttons.forEach(btn => btn.disabled = true);
            
            try {
                gameState = await apiCall('choice', {
                    game_id: gameState.game_id,
                    choice,
                    history: gameState.history
                });
                displayGame();
            } catch (error) {
                showError(error.message);
            }
        }

        function displayGame() {
            document.getElementById('setup-form').classList.add('hidden');
            document.getElementById('game-area').classList.remove('hidden');
            
            document.getElementById('scene').textContent = gameState.scene;
            
            const choicesDiv = document.getElementById('choices');
            choicesDiv.innerHTML = '';
            gameState.choices.forEach((choice, i) => {
                const btn = document.createElement('button');
                btn.className = 'choice-btn';
                btn.textContent = `${i + 1}. ${choice}`;
                btn.onclick = () => makeChoice(choice);
                choicesDiv.appendChild(btn);
            });
        }

        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = `Error: ${message}`;
            errorDiv.classList.remove('hidden');
        }
    </script>
</body>
</html>
