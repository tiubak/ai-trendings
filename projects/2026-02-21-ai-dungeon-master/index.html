<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Dungeon Master | AI Trendings</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 30px;
            backdrop-filter: blur(10px);
        }
        h1 { text-align: center; color: #00d4aa; margin-bottom: 10px; }
        .subtitle { text-align: center; color: rgba(255,255,255,0.7); margin-bottom: 30px; }
        .back-link { color: rgba(255,255,255,0.7); text-decoration: none; }
        .back-link:hover { color: #fff; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: rgba(255,255,255,0.9); }
        .form-group input, .form-group select {
            width: 100%; padding: 12px; border: 1px solid rgba(255,255,255,0.2);
            border-radius: 6px; background: rgba(0,0,0,0.3); color: #fff; font-size: 1rem;
        }
        button {
            width: 100%; padding: 14px; background: linear-gradient(135deg, #00d4aa, #00d4ff);
            border: none; border-radius: 6px; color: #fff; font-size: 1.1rem; font-weight: 600;
            cursor: pointer; transition: transform 0.2s;
        }
        button:hover { transform: translateY(-2px); }
        button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .scene { background: rgba(0,0,0,0.2); border-radius: 8px; padding: 20px; margin-bottom: 20px; }
        .choices { display: flex; flex-direction: column; gap: 10px; }
        .choice-btn {
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            border-radius: 6px; padding: 12px; color: #fff; cursor: pointer; transition: all 0.2s;
        }
        .choice-btn:hover { background: rgba(255,255,255,0.2); }
        .hidden { display: none; }
        .error { background: rgba(255,82,82,0.1); border: 1px solid rgba(255,82,82,0.3); padding: 12px; border-radius: 6px; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <a href="../../" class="back-link">← Back to AI Trendings</a>
        <h1>🏰 AI Dungeon Master</h1>
        <p class="subtitle">An AI-powered text adventure game</p>

        <div id="start-screen">
            <div class="form-group">
                <label>Theme</label>
                <select id="theme">
                    <option value="fantasy">Fantasy</option>
                    <option value="sci-fi">Sci-Fi</option>
                    <option value="horror">Horror</option>
                    <option value="mystery">Mystery</option>
                </select>
            </div>
            <div class="form-group">
                <label>Player Name</label>
                <input type="text" id="playerName" placeholder="Adventurer">
            </div>
            <button onclick="startGame()">Start Adventure</button>
        </div>

        <div id="game-screen" class="hidden">
            <div class="scene" id="sceneText">Loading...</div>
            <div class="choices" id="choices"></div>
        </div>

        <div id="error" class="error hidden"></div>
    </div>

    <script>
        let gameId = null;
        const API_BASE = '/api/dungeon-master';

        async function apiCall(endpoint, method = 'POST', body = null) {
            const options = {
                method,
                headers: { 'Content-Type': 'application/json' }
            };
            if (body) options.body = JSON.stringify(body);
            
            const response = await fetch(`${API_BASE}/${endpoint}`, options);
            if (!response.ok) {
                const error = await response.json().catch(() => ({}));
                throw new Error(error.error || `HTTP ${response.status}`);
            }
            return await response.json();
        }

        async function startGame() {
            const theme = document.getElementById('theme').value;
            const playerName = document.getElementById('playerName').value || 'Adventurer';
            
            try {
                document.getElementById('error').classList.add('hidden');
                const data = await apiCall('start', 'POST', { theme, player_name: playerName });
                
                gameId = data.game_id;
                document.getElementById('start-screen').classList.add('hidden');
                document.getElementById('game-screen').classList.remove('hidden');
                
                updateScene(data.scene, data.choices);
            } catch (error) {
                showError(error.message);
            }
        }

        async function makeChoice(index) {
            if (!gameId) return;
            
            try {
                const data = await apiCall('choice', 'POST', { 
                    game_id: gameId, 
                    choice_index: index 
                });
                updateScene(data.scene, data.choices);
            } catch (error) {
                showError(error.message);
            }
        }

        function updateScene(scene, choices) {
            document.getElementById('sceneText').textContent = scene;
            const choicesDiv = document.getElementById('choices');
            choicesDiv.innerHTML = '';
            
            choices.forEach((choice, idx) => {
                const btn = document.createElement('button');
                btn.className = 'choice-btn';
                btn.textContent = choice;
                btn.onclick = () => makeChoice(idx);
                choicesDiv.appendChild(btn);
            });
        }

        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = `Error: ${message}`;
            errorDiv.classList.remove('hidden');
        }
    </script>
</body>
</html>
