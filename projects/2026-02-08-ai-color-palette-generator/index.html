<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Color Palette Generator - 2026-02-08</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 8px;
            font-size: 2.5rem;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        .subtitle {
            text-align: center;
            color: rgba(255,255,255,0.9);
            margin-bottom: 40px;
            font-size: 1.2rem;
        }

        .control-panel {
            background: white;
            border-radius: 16px;
            padding: 28px;
            margin-bottom: 32px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .section {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #667eea;
        }

        input[type="text"], select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }

        select {
            cursor: pointer;
        }

        .row {
            display: flex;
            gap: 16px;
        }

        .row .section {
            flex: 1;
        }

        .btn-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn {
            flex: 1;
            min-width: 150px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #f093fb, #f5576c);
        }

        .results {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .palette-header {
            padding: 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .palette-title {
            font-size: 1.5rem;
            margin-bottom: 8px;
        }

        .palette-meta {
            opacity: 0.9;
            font-size: 0.95rem;
        }

        .colors-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        }

        .color-swatch {
            min-height: 200px;
            display: flex;
            align-items: flex-end;
            padding: 16px;
            transition: all 0.3s;
            position: relative;
        }

        .color-swatch:hover {
            min-height: 220px;
        }

        .swatch-info {
            background: rgba(0,0,0,0.5);
            color: white;
            padding: 12px;
            border-radius: 8px;
            width: 100%;
            backdrop-filter: blur(10px);
        }

        .color-name {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .color-hex {
            font-family: 'Monaco', monospace;
            font-size: 0.9rem;
            opacity: 0.9;
        }

        .color-rgb {
            font-size: 0.85rem;
            opacity: 0.8;
        }

        .copy-hint {
            text-align: center;
            color: #999;
            font-size: 0.85rem;
            padding: 12px;
            background: #f8f9fa;
        }

        .harmony-section {
            padding: 20px;
            background: #f8f9fa;
        }

        .harmony-type {
            font-weight: 600;
            color: #667eea;
            margin-bottom: 8px;
        }

        .contrast-badge {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            margin-top: 12px;
        }

        .usage-tip {
            padding: 20px;
            background: #e8f4f8;
            border-left: 4px solid #667eea;
            margin: 16px 24px;
            border-radius: 0 8px 8px 0;
        }

        .usage-tip strong {
            color: #667eea;
        }

        .hidden {
            display: none;
        }

        .message {
            text-align: center;
            padding: 40px;
            color: white;
            font-size: 1.2rem;
        }

        .lock-panel {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .locked-content {
            background: white;
            padding: 40px;
            border-radius: 16px;
            text-align: center;
            max-width: 400px;
        }

        .lock-icon {
            font-size: 5rem;
            margin-bottom: 20px;
        }

        @media (max-width: 600px) {
            .color-swatch:hover {
                min-height: 200px;
            }
            .colors-container {
                grid-template-columns: 1fr;
            }
            .btn-group {
                flex-direction: column;
            }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h1>AI Color Palette Generator</h1>
        <p class="subtitle">Create AI-generated color palettes from mood, keywords, or base colors</p>

        <div class="control-panel">
            <div class="section">
                <label>Generation Mode</label>
                <div class="btn-group">
                    <button class="btn" onclick="setMode('mood')" id="btnMood">From Mood</button>
                    <button class="btn btn-secondary" onclick="setMode('keyword')" id="btnKeyword">From Keyword</button>
                    <button class="btn" style="background: linear-gradient(135deg, #e94560, #c23a51);" onclick="setMode('harmony')" id="btnHarmony">Harmonious Colors</button>
                </div>
            </div>

            <div id="moodControls">
                <div class="row">
                    <div class="section">
                        <label for="mood">Mood/Emotion</label>
                        <input type="text" id="mood" placeholder="e.g., calm, energetic, mysterious, joyful...">
                    </div>
                    <div class="section">
                        <label for="paletteSize">Palette Size</label>
                        <select id="paletteSize">
                            <option value="3">3 colors</option>
                            <option value="4">4 colors</option>
                            <option value="5" selected>5 colors</option>
                        </select>
                    </div>
                </div>
            </div>

            <div id="keywordControls" class="hidden">
                <div class="row">
                    <div class="section">
                        <label for="keyword">Keyword</label>
                        <input type="text" id="keyword" placeholder="e.g., ocean, sunrise, forest, city...">
                    </div>
                    <div class="section">
                        <label for="style">Style</label>
                        <select id="style">
                            <option value="modern">Modern</option>
                            <option value="vintage">Vintage</option>
                            <option value="minimalist">Minimalist</option>
                            <option value="bold">Bold</option>
                        </select>
                    </div>
                </div>
            </div>

            <div id="harmonyControls" class="hidden">
                <div class="section">
                    <label for="baseColor">Base Color (hex format #RRGGBB)</label>
                    <input type="text" id="baseColor" placeholder="#3498DB" value="#3498DB">
                </div>
            </div>

            <button class="btn" onclick="generatePalette()" style="width: 100%; margin-top: 16px;">Generate Palette</button>
        </div>

        <div id="loading" class="hidden message">
            <p>Consulting the color oracle...</p>
        </div>

        <div id="results" class="results hidden">
            <div class="palette-header">
                <div class="palette-title" id="paletteTitle">Your Color Palette</div>
                <div class="palette-meta" id="paletteMeta">Generated with AI</div>
            </div>

            <div class="colors-container" id="colorsContainer"></div>

            <div class="usage-tip" id="usageTip">
                <strong>💡 Usage Tip:</strong> <span id="tipText"></span>
            </div>

            <div class="harmony-section hidden" id="harmonySection">
                <div class="harmony-type">Color Harmony Scheme</div>
                <div id="harmonyType" style="margin-bottom: 12px; color: #555;">-</div>
                <div id="harmonyExplanation" style="color: #555; line-height: 1.6;"></div>
                <div class="contrast-badge" id="contrastBadge">WCAG AA Compliant</div>
            </div>
        </div>

        <div id="clipboardNotification" class="message hidden" style="position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); padding: 12px 24px; border-radius: 20px;">
            Copied to clipboard!
        </div>
    </div>

    <script>
        const API_URL = '/api/2026-02-08-ai-color-palette-generator';
        let currentMode = 'mood';

        function setMode(mode) {
            currentMode = mode;
            document.getElementById('moodControls').classList.add('hidden');
            document.getElementById('keywordControls').classList.add('hidden');
            document.getElementById('harmonyControls').classList.add('hidden');

            document.getElementById('btnMood').classList.remove('btn-secondary');
            document.getElementById('btnKeyword').classList.remove('btn-secondary');
            document.getElementById('btnHarmony').classList.remove('btn-secondary');

            if (mode === 'mood') {
                document.getElementById('moodControls').classList.remove('hidden');
                document.getElementById('btnMood').classList.add('btn-secondary');
            } else if (mode === 'keyword') {
                document.getElementById('keywordControls').classList.remove('hidden');
                document.getElementById('btnKeyword').classList.add('btn-secondary');
            } else if (mode === 'harmony') {
                document.getElementById('harmonyControls').classList.remove('hidden');
                document.getElementById('btnHarmony').classList.add('btn-secondary');
            }
        }

        async function generatePalette() {
            let request;
            let action;

            if (currentMode === 'mood') {
                const mood = document.getElementById('mood').value.trim();
                if (!mood) {
                    alert('Please enter a mood.');
                    return;
                }
                request = {
                    action: 'from_mood',
                    mood: mood,
                    palette_size: parseInt(document.getElementById('paletteSize').value)
                };
                action = 'from_mood';
            } else if (currentMode === 'keyword') {
                const keyword = document.getElementById('keyword').value.trim();
                if (!keyword) {
                    alert('Please enter a keyword.');
                    return;
                }
                request = {
                    action: 'from_keyword',
                    keyword: keyword,
                    style: document.getElementById('style').value
                };
                action = 'from_keyword';
            } else if (currentMode === 'harmony') {
                const base = document.getElementById('baseColor').value.trim();
                if (!base || !base.startsWith('#')) {
                    alert('Please enter a valid hex color code (e.g., #3498DB).');
                    return;
                }
                request = {
                    action: 'harmonious',
                    base_color: base
                };
                action = 'harmonious';
            }

            document.querySelector('.control-panel').style.opacity = '0.6';
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('results').classList.add('hidden');

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(request)
                });
                const result = await response.json();

                displayResults(result, action);
            } catch (error) {
                console.error(error);
                alert('Network error. Please try again.');
            }

            document.getElementById('loading').classList.add('hidden');
            document.querySelector('.control-panel').style.opacity = '1';
        }

        function displayResults(result, action) {
            document.getElementById('results').classList.remove('hidden');
            document.getElementById('colorsContainer').innerHTML = '';
            document.getElementById('harmonySection').classList.add('hidden');

            let title = '';
            let meta = '';
            let palette = [];

            if (action === 'from_mood') {
                const p = result.palette;
                title = `${p.overall_mood} Mood Palette`;
                meta = p.usage_tip || '';
                palette = p.palette;
                document.getElementById('tipText').textContent = p.usage_tip || 'Use these colors to evoke the desired mood.';
            } else if (action === 'from_keyword') {
                const p = result.palette_data;
                title = `Palette: ${p.keyword} (${p.style} style)`;
                meta = p.total_vibe || '';
                palette = p.palette;
                document.getElementById('usageTip').innerHTML = `<strong>💡 Best for:</strong> ${(p.best_use_cases || ['Various projects']).join(', ')}`;
            } else if (action === 'harmonious') {
                const p = result.harmony;
                title = `Harmonious Palette from ${p.base_color}`;
                meta = `Scheme: ${p.scheme_type}`;
                palette = p.palette;
                document.getElementById('harmonySection').classList.remove('hidden');
                document.getElementById('harmonyType').textContent = p.scheme_type.charAt(0).toUpperCase() + p.scheme_type.slice(1);
                document.getElementById('harmonyExplanation').innerHTML = (palette.map(c => `<div><strong>${c.name}:</strong> ${c.harmony_explanation}</div>`).join(''));
                document.getElementById('contrastBadge').textContent = `WCAG ${p.contrast_ratio}`;
                document.getElementById('tipText').textContent = 'These colors work together harmoniously. Use the base color for primary elements and accents for variety.';
            }

            document.getElementById('paletteTitle').textContent = title;
            document.getElementById('paletteMeta').textContent = meta;

            palette.forEach(color => {
                const swatch = document.createElement('div');
                swatch.className = 'color-swatch';
                swatch.style.backgroundColor = color.hex;
                swatch.onclick = () => copyToClipboard(color.hex);

                swatch.innerHTML = `
                    <div class="swatch-info">
                        <div class="color-name">${color.name}</div>
                        <div class="color-hex">${color.hex}</div>
                        ${color.rgb ? `<div class="color-rgb">${color.rgb}</div>` : ''}
                        ${color.description ? `<div style="margin-top:6px; font-size:0.85rem; opacity:0.9;">${color.description}</div>` : ''}
                        ${color.role ? `<div style="margin-top:6px; font-size:0.85rem; opacity:0.9;">Role: ${color.role}</div>` : ''}
                    </div>
                `;
                document.getElementById('colorsContainer').appendChild(swatch);
            });

            document.querySelector('.copy-hint').textContent = 'Click any color to copy its hex code';
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                const notif = document.getElementById('clipboardNotification');
                notif.classList.remove('hidden');
                setTimeout(() => {
                    notif.classList.add('hidden');
                }, 1500);
            }).catch(err => {
                // Fallback
                const textarea = document.createElement('textarea');
                textarea.value = text;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
            });
        }

        function setExample() {
            // Set example for demo purposes
            document.getElementById('mood').value = 'calm';
        }
    </script>
</body>
</html>
