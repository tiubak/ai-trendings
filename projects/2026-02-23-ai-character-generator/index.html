<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Character Generator | AI Trendings</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1e3a5f 0%, #0d1b2a 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 30px;
            backdrop-filter: blur(10px);
        }
        h1 { text-align: center; color: #f59e0b; margin-bottom: 10px; }
        .subtitle { text-align: center; color: rgba(255,255,255,0.7); margin-bottom: 30px; }
        .back-link { color: rgba(255,255,255,0.7); text-decoration: none; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: rgba(255,255,255,0.9); }
        .form-group input, .form-group select {
            width: 100%; padding: 12px; border: 1px solid rgba(255,255,255,0.2);
            border-radius: 6px; background: rgba(0,0,0,0.3); color: #fff; font-size: 1rem;
        }
        button {
            width: 100%; padding: 14px; background: linear-gradient(135deg, #f59e0b, #d97706);
            border: none; border-radius: 6px; color: #fff; font-size: 1.1rem; font-weight: 600;
            cursor: pointer; transition: transform 0.2s;
        }
        button:hover { transform: translateY(-2px); }
        .character-card { background: rgba(0,0,0,0.2); border-radius: 12px; padding: 25px; }
        .character-name { font-size: 2rem; color: #f59e0b; margin-bottom: 5px; }
        .character-role { color: rgba(255,255,255,0.7); margin-bottom: 20px; }
        .character-section { margin-bottom: 15px; }
        .character-section h3 { color: #f59e0b; margin-bottom: 8px; font-size: 1rem; }
        .character-section p { line-height: 1.6; }
        .traits { display: flex; gap: 8px; flex-wrap: wrap; }
        .trait { background: rgba(245, 158, 11, 0.2); padding: 6px 12px; border-radius: 20px; font-size: 0.9rem; }
        .quote { font-style: italic; color: rgba(255,255,255,0.8); border-left: 3px solid #f59e0b; padding-left: 15px; margin-top: 20px; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <a href="../" class="back-link">← Back to Projects</a>
        <h1>👤 AI Character Generator</h1>
        <p class="subtitle">Create unique characters for your stories and games</p>
        
        <div id="setup-form">
            <div class="form-group">
                <label for="name">Character Name</label>
                <input type="text" id="name" placeholder="e.g., Elena Stormwind">
            </div>
            <div class="form-group">
                <label for="role">Character Role</label>
                <select id="role">
                    <option value="Hero">Hero</option>
                    <option value="Villain">Villain</option>
                    <option value="Mentor">Mentor</option>
                    <option value="Sidekick">Sidekick</option>
                    <option value="Anti-hero">Anti-hero</option>
                </select>
            </div>
            <div class="form-group">
                <label for="setting">Setting</label>
                <input type="text" id="setting" placeholder="e.g., medieval kingdom, cyberpunk city" value="fantasy realm">
            </div>
            <div class="form-group">
                <label for="theme">Theme</label>
                <input type="text" id="theme" placeholder="e.g., redemption, power, love" value="adventure">
            </div>
            <button onclick="generateCharacter()">Generate Character</button>
        </div>
        
        <div id="character-area" class="hidden">
            <div class="character-card">
                <div id="character-content"></div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = '/api/character';

        async function apiCall(action, data = {}) {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action, ...data })
            });
            return response.json();
        }

        async function generateCharacter() {
            const name = document.getElementById('name').value || 'Unknown Hero';
            const role = document.getElementById('role').value;
            const setting = document.getElementById('setting').value;
            const theme = document.getElementById('theme').value;
            
            document.querySelector('button').disabled = true;
            document.querySelector('button').textContent = 'Generating...';
            
            try {
                const result = await apiCall('start', { name, role, setting, theme });
                displayCharacter(result.character);
            } catch (error) {
                console.error(error);
            }
            
            document.querySelector('button').disabled = false;
            document.querySelector('button').textContent = 'Generate Character';
        }

        function displayCharacter(char) {
            document.getElementById('setup-form').classList.add('hidden');
            document.getElementById('character-area').classList.remove('hidden');
            
            const html = `
                <div class="character-name">${char.name}</div>
                <div class="character-role">${char.role}</div>
                
                <div class="character-section">
                    <h3>Backstory</h3>
                    <p>${char.backstory}</p>
                </div>
                
                <div class="character-section">
                    <h3>Personality</h3>
                    <p>${char.personality}</p>
                </div>
                
                <div class="character-section">
                    <h3>Strengths</h3>
                    <div class="traits">
                        ${char.strengths.map(s => `<span class="trait">${s}</span>`).join('')}
                    </div>
                </div>
                
                <div class="character-section">
                    <h3>Weaknesses</h3>
                    <div class="traits">
                        ${char.weaknesses.map(w => `<span class="trait">${w}</span>`).join('')}
                    </div>
                </div>
                
                <div class="character-section">
                    <h3>Motivation</h3>
                    <p>${char.motivation}</p>
                </div>
                
                <div class="quote">"${char.signature_quote}"</div>
            `;
            
            document.getElementById('character-content').innerHTML = html;
        }
    </script>
</body>
</html>
