<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Frontier Tracker | AI Trendings</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #ec4899;
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            --success: #10b981;
            --warning: #f59e0b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 30px;
        }

        .back-link {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            margin-bottom: 10px;
            display: inline-block;
        }

        .back-link:hover {
            color: var(--primary);
        }

        h1 {
            font-size: 2.5rem;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 30px;
            justify-content: center;
        }

        .tab {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9rem;
        }

        .tab:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .tab.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 1.5rem;
            margin-bottom: 15px;
            color: var(--primary);
        }

        .quick-facts {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }

        .fact {
            background: rgba(99, 102, 241, 0.1);
            border-left: 3px solid var(--primary);
            padding: 15px;
            border-radius: 0 8px 8px 0;
        }

        .fact strong {
            color: var(--primary);
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: background 0.2s;
            margin: 5px;
        }

        .btn:hover {
            background: var(--primary-dark);
        }

        .btn-secondary {
            background: var(--bg-card);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }

        .spinner {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .content {
            margin-top: 20px;
        }

        .content h3 {
            color: var(--primary);
            margin: 20px 0 10px;
        }

        .content h4 {
            color: var(--secondary);
            margin: 15px 0 8px;
        }

        .content p {
            margin-bottom: 15px;
        }

        .content ul, .content ol {
            margin-left: 25px;
            margin-bottom: 15px;
        }

        .content li {
            margin-bottom: 8px;
        }

        .content pre {
            background: #000;
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 15px 0;
            font-size: 0.85rem;
        }

        .image-container {
            text-align: center;
            margin: 20px 0;
        }

        .image-container img {
            max-width: 100%;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .quiz-container {
            margin: 15px 0;
        }

        .quiz-question {
            background: rgba(0,0,0,0.2);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .quiz-question p {
            margin-bottom: 10px;
            font-weight: 500;
        }

        .quiz-options {
            margin-left: 20px;
        }

        .quiz-option {
            display: block;
            padding: 8px 15px;
            margin: 5px 0;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .quiz-option:hover {
            border-color: var(--primary);
        }

        .quiz-option.correct {
            border-color: var(--success);
            background: rgba(16, 185, 129, 0.1);
        }

        .quiz-option.incorrect {
            border-color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
        }

        .quiz-explanation {
            margin-top: 10px;
            padding: 10px;
            background: rgba(99, 102, 241, 0.1);
            border-radius: 6px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .resources-list {
            list-style: none;
            margin-left: 0;
        }

        .resources-list li {
            background: rgba(0,0,0,0.2);
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
        }

        .resources-list strong {
            color: var(--primary);
            display: block;
            margin-bottom: 5px;
        }

        .error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid #ef4444;
            color: #fca5a5;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
        }

        .date-badge {
            display: inline-block;
            background: var(--secondary);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-bottom: 15px;
        }

        .select-group {
            margin: 15px 0;
        }

        .select-group label {
            display: block;
            margin-bottom: 5px;
            color: var(--text-muted);
        }

        select, input, textarea {
            background: var(--bg-dark);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 12px;
            border-radius: 6px;
            width: 100%;
            max-width: 400px;
            margin-bottom: 10px;
        }

        select:focus, input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
            }

            .tabs {
                justify-content: flex-start;
            }

            .tab {
                padding: 8px 15px;
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <a href="../" class="back-link">← Back to AI Trendings</a>
            <h1>AI Frontier Tracker</h1>
            <p class="subtitle">Explore current AI trends, emerging technologies, and the evolving landscape</p>
            <span class="date-badge">February 12, 2026</span>
        </header>

        <div class="tabs">
            <button class="tab active" data-action="start">Overview</button>
            <button class="tab" data-action="hot_topics">Hot Topics</button>
            <button class="tab" data-action="emerging_tech">Emerging Tech</button>
            <button class="tab" data-action="industry_trends">Industry Trends</button>
            <button class="tab" data-action="future_outlook">Future Outlook</button>
            <button class="tab" data-action="visualize">Visualize</button>
            <button class="tab" data-action="quiz">Quiz</button>
            <button class="tab" data-action="resources">Resources</button>
        </div>

        <div id="content" class="card">
            <div class="loading">
                <div class="spinner"></div>
                Loading...
            </div>
        </div>
    </div>

    <script>
        const API_URL = '/api';
        let currentAction = 'start';
        let quizState = {answered: {}, showResults: false};

        // Tab click handlers
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentAction = tab.dataset.action;
                resetQuiz();
                loadContent(currentAction, {});
            });
        });

        async function loadContent(action, data) {
            const contentDiv = document.getElementById('content');
            contentDiv.innerHTML = '<div class="loading"><div class="spinner"></div>Loading...</div>';

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        date: '2026-02-12',
                        action: action,
                        ...data
                    })
                });

                const result = await response.json();

                if (result.error) {
                    contentDiv.innerHTML = `<div class="error">Error: ${result.error}</div>`;
                } else {
                    contentDiv.innerHTML = renderContent(action, result);
                    setupEventListeners(action, result);
                }
            } catch (error) {
                contentDiv.innerHTML = `<div class="error">Failed to load: ${error.message}</div>`;
            }
        }

        function renderContent(action, data) {
            switch(action) {
                case 'start':
                    return renderStart(data);
                case 'hot_topics':
                    return renderHotTopics(data);
                case 'emerging_tech':
                    return renderEmergingTech(data);
                case 'industry_trends':
                    return renderIndustryTrends(data);
                case 'future_outlook':
                    return renderFutureOutlook(data);
                case 'visualize':
                    return renderVisualize(data);
                case 'quiz':
                    return renderQuiz(data);
                case 'resources':
                    return renderResources(data);
                default:
                    return '<p>Unknown content</p>';
            }
        }

        function renderStart(data) {
            return `
                <h2 class="section-title">Current AI Landscape</h2>
                <div class="quick-facts">
                    ${data.quick_facts.map(f => `<div class="fact"><strong>${f}</strong></div>`).join('')}
                </div>
                <div class="content">
                    ${formatText(data.overview)}
                </div>
            `;
        }

        function renderHotTopics(data) {
            return `
                <h2 class="section-title">Hottest Topics in AI Research</h2>
                ${data.visualization_url ? `<div class="image-container"><img src="${data.visualization_url}" alt="AI Trends Word Cloud" onerror="this.style.display='none'"></div>` : ''}
                <div class="content">
                    ${formatText(data.hot_topics)}
                </div>
            `;
        }

        function renderEmergingTech(data) {
            let categoryLabel = data.category === 'all' ? 'All Categories' : data.category.replace('_', ' ');
            return `
                <h2 class="section-title">Emerging Technologies</h2>
                <div class="select-group">
                    <label>Category:</label>
                    <select id="category-select" onchange="changeCategory()">
                        <option value="all" ${data.category === 'all' ? 'selected' : ''}>All Categories</option>
                        <option value="architecture" ${data.category === 'architecture' ? 'selected' : ''}>Architecture</option>
                        <option value="training" ${data.category === 'training' ? 'selected' : ''}>Training Methods</option>
                        <option value="inference" ${data.category === 'inference' ? 'selected' : ''}>Inference</option>
                        <option value="applications" ${data.category === 'applications' ? 'selected' : ''}>Applications</option>
                    </select>
                </div>
                ${data.visualization_url ? `<div class="image-container"><img src="${data.visualization_url}" alt="Emerging Tech Visualization" onerror="this.style.display='none'"></div>` : ''}
                <div class="content">
                    ${formatText(data.emerging_tech)}
                </div>
            `;
        }

        function renderIndustryTrends(data) {
            let industryLabel = data.industry === 'all' ? 'All Industries' : data.industry.replace('_', ' ').replace(/\b\w/g, l => l.toUpperCase());
            return `
                <h2 class="section-title">Industry Adoption Trends</h2>
                <div class="select-group">
                    <label>Industry:</label>
                    <select id="industry-select" onchange="changeIndustry()">
                        <option value="all" ${data.industry === 'all' ? 'selected' : ''}>All Industries</option>
                        <option value="healthcare" ${data.industry === 'healthcare' ? 'selected' : ''}>Healthcare</option>
                        <option value="finance" ${data.industry === 'finance' ? 'selected' : ''}>Finance</option>
                        <option value="education" ${data.industry === 'education' ? 'selected' : ''}>Education</option>
                        <option value="creative" ${data.industry === 'creative' ? 'selected' : ''}>Creative</option>
                    </select>
                </div>
                <div class="content">
                    ${formatText(data.industry_trends)}
                </div>
            `;
        }

        function renderFutureOutlook(data) {
            let timeframeLabels = {'1year': 'Next 12 Months', '2years': 'Next 2 Years', '5years': 'Next 5 Years'};
            return `
                <h2 class="section-title">Future Outlook</h2>
                <div class="select-group">
                    <label>Timeframe:</label>
                    <select id="timeframe-select" onchange="changeTimeframe()">
                        <option value="1year" ${data.timeframe === '1year' ? 'selected' : ''}>Next 12 Months</option>
                        <option value="2years" ${data.timeframe === '2years' ? 'selected' : ''}>Next 2 Years</option>
                        <option value="5years" ${data.timeframe === '5years' ? 'selected' : ''}>Next 5 Years</option>
                    </select>
                </div>
                <div class="content">
                    ${formatText(data.future_outlook)}
                </div>
            `;
        }

        function renderVisualize(data) {
            return `
                <h2 class="section-title">AI Landscape Visualization</h2>
                <div class="select-group">
                    <label>Visualization Type:</label>
                    <select id="viz-type-select" onchange="changeVizType()">
                        <option value="landscape" ${data.type === 'landscape' ? 'selected' : ''}>Landscape Map</option>
                        <option value="timeline" ${data.type === 'timeline' ? 'selected' : ''}>Timeline</option>
                        <option value="ecosystem" ${data.type === 'ecosystem' ? 'selected' : ''}>Ecosystem</option>
                        <option value="trends" ${data.type === 'trends' ? 'selected' : ''}>Trends Data</option>
                        <option value="future" ${data.type === 'future' ? 'selected' : ''}>Future Vision</option>
                    </select>
                </div>
                <div class="image-container">
                    <img id="viz-image" src="${data.image_url}" alt="AI Visualization" style="max-width:100%; border-radius:8px; border:1px solid #334155;" onerror="this.parentElement.innerHTML='<p style=\"color:#94a3b8\">Image failed to load</p>'">
                </div>
                <p style="text-align:center; color:#94a3b8; font-size:0.9rem; margin-top:10px;">
                    Generated with AI based on current AI trends in ${data.year}
                </p>
            `;
        }

        function renderQuiz(data) {
            if (!data.quiz || data.quiz.length === 0) {
                return '<div class="content"><p>No quiz questions available yet. Try again later!</p></div>';
            }

            const rendered = data.quiz.map((q, idx) => {
                const questionId = `q${idx}`;
                const isAnswered = quizState.answered[questionId] !== undefined;
                const userAnswer = quizState.answered[questionId];
                const showResult = quizState.showResults;

                return `
                    <div class="quiz-question" id="${questionId}">
                        <p><strong>Q${idx + 1}: ${q.question}</strong></p>
                        <div class="quiz-options">
                            ${q.options.map((opt, optIdx) => {
                                let classes = 'quiz-option';
                                if (showResult) {
                                    if (optIdx === q.correct) {
                                        classes += ' correct';
                                    } else if (isAnswered && optIdx === userAnswer && optIdx !== q.correct) {
                                        classes += ' incorrect';
                                    }
                                } else if (isAnswered && optIdx === userAnswer) {
                                    classes += ' selected';
                                }
                                return `<label class="${classes}">
                                    <input type="radio" name="${questionId}" value="${optIdx}"
                                        ${isAnswered ? 'disabled' : ''}
                                        ${isAnswered && optIdx === userAnswer ? 'checked' : ''}>
                                    ${opt}
                                </label>`;
                            }).join('')}
                        </div>
                        ${showResult ? `<div class="quiz-explanation"><strong>Explanation:</strong> ${q.explanation}</div>` : ''}
                    </div>
                `;
            }).join('');

            const buttonHtml = data.quiz.length > 0 && !quizState.showResults ?
                `<button class="btn" onclick="submitQuiz()">Check Answers</button>` :
                (quizState.showResults ?
                    `<button class="btn btn-secondary" onclick="resetQuiz()">Try Again</button>` :
                    '');

            return `
                <h2 class="section-title">Test Your AI Trends Knowledge</h2>
                <div class="content">
                    ${rendered}
                    <div style="margin-top:20px;">
                        ${buttonHtml}
                    </div>
                </div>
            `;
        }

        function renderResources(data) {
            return `
                <h2 class="section-title">Stay Current with AI Trends</h2>
                <div class="content">
                    ${formatText(data.resources)}
                </div>
            `;
        }

        function formatText(text) {
            if (!text) return '<p>No content available.</p>';
            // Simple formatting: convert markdown-like to HTML
            let html = text
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/g, '<em>$1</em>')
                .replace(/`(.*?)`/g, '<code>$1</code>')
                .replace(/^### (.*$)/gm, '<h4>$1</h4>')
                .replace(/^## (.*$)/gm, '<h3>$1</h3>')
                .replace(/^# (.*$)/gm, '<h2>$1</h2>')
                .replace(/^(\d+\.) /gm, '<li>')
                .replace(/^- /gm, '<li>')
                .replace(/\n\n/g, '</p><p>')
                .replace(/\n/g, '<br>');
            return `<p>${html}</p>`;
        }

        function setupEventListeners(action, data) {
            // Any action-specific event listeners
            if (action === 'quiz') {
                // Attach radio change listeners
                document.querySelectorAll('input[type="radio"]').forEach(radio => {
                    radio.onchange = () => {
                        const questionId = radio.name;
                        quizState.answered[questionId] = parseInt(radio.value);
                    };
                });
            }
        }

        function changeCategory() {
            const category = document.getElementById('category-select').value;
            loadContent('emerging_tech', {category});
        }

        function changeIndustry() {
            const industry = document.getElementById('industry-select').value;
            loadContent('industry_trends', {industry});
        }

        function changeTimeframe() {
            const timeframe = document.getElementById('timeframe-select').value;
            loadContent('future_outlook', {timeframe});
        }

        function changeVizType() {
            const type = document.getElementById('viz-type-select').value;
            loadContent('visualize', {type});
        }

        function submitQuiz() {
            quizState.showResults = true;
            // Re-render quiz
            loadContent('quiz', {});
        }

        function resetQuiz() {
            quizState = {answered: {}, showResults: false};
            loadContent(currentAction, getCurrentData());
        }

        function getCurrentData() {
            switch(currentAction) {
                case 'emerging_tech':
                    return {category: document.getElementById('category-select')?.value || 'all'};
                case 'industry_trends':
                    return {industry: document.getElementById('industry-select')?.value || 'all'};
                case 'future_outlook':
                    return {timeframe: document.getElementById('timeframe-select')?.value || '2years'};
                case 'visualize':
                    return {type: document.getElementById('viz-type-select')?.value || 'landscape'};
                default:
                    return {};
            }
        }

        // Initial load
        loadContent('start', {});
    </script>
</body>
</html>
