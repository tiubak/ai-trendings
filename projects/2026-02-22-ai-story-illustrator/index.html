<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Story Illustrator | AI Trendings</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #2d1b4e 0%, #1a1a2e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 30px;
            backdrop-filter: blur(10px);
        }
        h1 { text-align: center; color: #a855f7; margin-bottom: 10px; }
        .subtitle { text-align: center; color: rgba(255,255,255,0.7); margin-bottom: 30px; }
        .back-link { color: rgba(255,255,255,0.7); text-decoration: none; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: rgba(255,255,255,0.9); }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; padding: 12px; border: 1px solid rgba(255,255,255,0.2);
            border-radius: 6px; background: rgba(0,0,0,0.3); color: #fff; font-size: 1rem;
        }
        .form-group textarea { min-height: 150px; resize: vertical; }
        button {
            width: 100%; padding: 14px; background: linear-gradient(135deg, #a855f7, #6366f1);
            border: none; border-radius: 6px; color: #fff; font-size: 1.1rem; font-weight: 600;
            cursor: pointer; transition: transform 0.2s; margin-bottom: 10px;
        }
        button:hover { transform: translateY(-2px); }
        .story-box { background: rgba(0,0,0,0.2); border-radius: 8px; padding: 20px; margin-bottom: 20px; white-space: pre-wrap; line-height: 1.6; }
        .image-prompt { background: rgba(168, 85, 247, 0.1); border: 1px solid rgba(168, 85, 247, 0.3); border-radius: 8px; padding: 20px; margin-bottom: 20px; }
        .actions { display: flex; gap: 10px; }
        .actions button { flex: 1; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <a href="../" class="back-link">← Back to Projects</a>
        <h1>📖 AI Story Illustrator</h1>
        <p class="subtitle">Create and enhance stories with AI-powered illustration prompts</p>
        
        <div id="setup-form">
            <div class="form-group">
                <label for="genre">Story Genre</label>
                <select id="genre">
                    <option value="fantasy">Fantasy</option>
                    <option value="sci-fi">Science Fiction</option>
                    <option value="romance">Romance</option>
                    <option value="thriller">Thriller</option>
                </select>
            </div>
            <div class="form-group">
                <label for="theme">Theme</label>
                <input type="text" id="theme" placeholder="e.g., redemption, discovery, love against odds" value="epic adventure">
            </div>
            <button onclick="startStory()">Create Story</button>
        </div>
        
        <div id="story-area" class="hidden">
            <div id="story" class="story-box"></div>
            
            <div class="form-group">
                <label for="style">Enhancement Style</label>
                <select id="style">
                    <option value="descriptive">Descriptive</option>
                    <option value="poetic">Poetic</option>
                    <option value="dramatic">Dramatic</option>
                </select>
            </div>
            
            <div class="actions">
                <button onclick="enhanceStory()">Enhance</button>
                <button onclick="illustrate()">Generate Image Prompt</button>
            </div>
            
            <div id="image-prompt" class="image-prompt hidden"></div>
        </div>
    </div>

    <script>
        const API_URL = '/api/story';
        let currentStory = '';

        async function apiCall(action, data = {}) {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action, ...data })
            });
            return response.json();
        }

        async function startStory() {
            const genre = document.getElementById('genre').value;
            const theme = document.getElementById('theme').value;
            
            try {
                const result = await apiCall('start', { genre, theme });
                currentStory = result.text;
                displayStory();
            } catch (error) {
                console.error(error);
            }
        }

        async function enhanceStory() {
            const style = document.getElementById('style').value;
            
            try {
                const result = await apiCall('enhance', { text: currentStory, style });
                currentStory = result.enhanced;
                displayStory();
            } catch (error) {
                console.error(error);
            }
        }

        async function illustrate() {
            try {
                const result = await apiCall('illustrate', { text: currentStory });
                const promptDiv = document.getElementById('image-prompt');
                promptDiv.innerHTML = `<strong>Image Prompt:</strong><br>${result.image_prompt}`;
                promptDiv.classList.remove('hidden');
            } catch (error) {
                console.error(error);
            }
        }

        function displayStory() {
            document.getElementById('setup-form').classList.add('hidden');
            document.getElementById('story-area').classList.remove('hidden');
            document.getElementById('story').textContent = currentStory;
        }
    </script>
</body>
</html>
