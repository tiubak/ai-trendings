<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Love Message Generator - 2026-02-14</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Dancing Script', cursive;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 30%, #fecfef 70%, #ff9a9e 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            animation: fadeIn 1.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        h1 {
            text-align: center;
            color: #d6336c;
            margin-bottom: 8px;
            font-size: 3rem;
            text-shadow: 2px 2px 4px rgba(255,255,255,0.8);
        }

        .subtitle {
            text-align: center;
            color: #c41e3a;
            margin-bottom: 40px;
            font-size: 1.4rem;
        }

        .hearts {
            text-align: center;
            font-size: 2rem;
            margin-bottom: 20px;
            animation: heartbeat 1.5s ease-in-out infinite;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .mode-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
        }

        .mode-tab {
            flex: 1;
            padding: 14px;
            background: white;
            border: 3px solid #d6336c;
            border-radius: 25px;
            color: #d6336c;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s;
            font-weight: 600;
        }

        .mode-tab.active {
            background: #d6336c;
            color: white;
        }

        .mode-tab:hover:not(.active) {
            background: #fff0f3;
        }

        .control-panel {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 28px;
            margin-bottom: 32px;
            box-shadow: 0 10px 40px rgba(214, 51, 108, 0.3);
            border: 3px solid #d6336c;
        }

        .section {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 700;
            color: #d6336c;
            font-size: 1.1rem;
        }

        input[type="text"], input[type="number"], select {
            width: 100%;
            padding: 14px;
            border: 3px solid #f8d0e4;
            border-radius: 12px;
            font-size: 1.1rem;
            color: #333;
            transition: border-color 0.3s;
            background: white;
        }

        input[type="text"]:focus, input[type="number"]:focus, select:focus {
            outline: none;
            border-color: #d6336c;
            box-shadow: 0 0 15px rgba(214, 51, 108, 0.3);
        }

        select {
            cursor: pointer;
        }

        .row {
            display: flex;
            gap: 16px;
        }

        .row .section {
            flex: 1;
        }

        .btn {
            background: linear-gradient(135deg, #d6336c, #c41e3a);
            color: white;
            border: none;
            padding: 18px 36px;
            border-radius: 25px;
            font-size: 1.3rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
            margin-top: 12px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(214, 51, 108, 0.5);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            margin-top: 10px;
        }

        .results {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 32px;
            margin-top: 20px;
            box-shadow: 0 10px 40px rgba(214, 51, 108, 0.3);
            border: 3px solid #d6336c;
            animation: slideUp 0.8s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-card {
            text-align: center;
            padding: 20px;
        }

        .love-message {
            font-size: 2rem;
            color: #d6336c;
            line-height: 1.6;
            margin-bottom: 28px;
            font-weight: 600;
            position: relative;
            padding: 20px;
        }

        .love-message::before,
        .love-message::after {
            content: '❤️';
            position: absolute;
            font-size: 1.5rem;
            opacity: 0.5;
        }

        .love-message::before {
            top: 0;
            left: 0;
        }

        .love-message::after {
            bottom: 0;
            right: 0;
        }

        .meta-badges {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 24px;
        }

        .badge {
            background: linear-gradient(135deg, #d6336c, #c41e3a);
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 1rem;
            font-weight: 600;
        }

        .badge.secondary {
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .metric {
            background: linear-gradient(135deg, #fff0f3, #ffe6ec);
            padding: 16px;
            border-radius: 12px;
            text-align: center;
        }

        .metric-label {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 6px;
        }

        .metric-value {
            font-size: 1.3rem;
            color: #d6336c;
            font-weight: 700;
        }

        .poetic-bar {
            margin-top: 20px;
        }

        .poetic-title {
            font-size: 1.2rem;
            color: #d6336c;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .poetic-list {
            list-style: none;
            padding: 0;
        }

        .poetic-list li {
            background: rgba(214, 51, 108, 0.1);
            padding: 10px 16px;
            margin: 8px 0;
            border-radius: 8px;
            border-left: 3px solid #d6336c;
            font-style: italic;
        }

        .tip-box {
            background: linear-gradient(135deg, #e8f4f8, #d4edda);
            border: 2px solid #198754;
            border-radius: 12px;
            padding: 16px;
            margin-top: 20px;
        }

        .tip-title {
            color: #198754;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .tip-content {
            color: #333;
            line-height: 1.6;
        }

        .flirty-section {
            margin: 16px 0;
        }

        .response-hint {
            margin-top: 16px;
            padding: 12px;
            background: rgba(102, 126, 234, 0.1);
            border-radius: 8px;
            color: #667eea;
        }

        .hidden {
            display: none;
        }

        .message {
            text-align: center;
            padding: 40px;
            color: #d6336c;
            font-size: 1.5rem;
        }

        .anniversary-years {
            font-size: 4rem;
            color: gold;
            text-align: center;
            margin: 20px 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        @media (max-width: 600px) {
            .mode-tabs {
                flex-direction: column;
            }
            .row {
                flex-direction: column;
            }
            h1 {
                font-size: 2rem;
            }
            .love-message {
                font-size: 1.5rem;
            }
            .anniversary-years {
                font-size: 3rem;
            }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="hearts">❤️ 💕 🌹 ❤️</div>

        <h1>💌 AI Love Message Generator 💌</h1>
        <p class="subtitle">Perfect words for the one you adore</p>

        <div class="mode-tabs">
            <div class="mode-tab active" onclick="setMode('romantic')" id="tabRomantic">Romantic</div>
            <div class="mode-tab" onclick="setMode('flirty')" id="tabFlirty">Flirty</div>
            <div class="mode-tab" onclick="setMode('anniversary')" id="tabAnniversary">Anniversary</div>
        </div>

        <div class="control-panel">
            <!-- Romantic Mode -->
            <div id="romanticMode">
                <div class="row">
                    <div class="section">
                        <label for="recipient">Their Name (optional)</label>
                        <input type="text" id="recipient" placeholder="e.g., Sarah, my love, babe">
                    </div>
                    <div class="section">
                        <label for="stage">Relationship Stage</label>
                        <select id="stage">
                            <option value="new">New Love (fresh feelings)</option>
                            <option value="established" selected>Established (deep love)</option>
                            <option value="long_term">Long-term (forever feeling)</option>
                        </select>
                    </div>
                </div>
                <div class="section">
                    <label for="length">Message Length</label>
                    <select id="length">
                        <option value="short">Short (tweetable)</option>
                        <option value="medium" selected>Medium (text)</option>
                        <option value="long">Long (letter/card)</option>
                    </select>
                </div>
            </div>

            <!-- Flirty Mode -->
            <div id="flirtyMode" class="hidden">
                <div class="row">
                    <div class="section">
                        <label for="flirtyStyle">Flirt Style</label>
                        <select id="flirtyStyle">
                            <option value="witty" selected>Witty</option>
                            <option value="cheesy">Cheesy</option>
                            <option value="cute">Cute</option>
                            <option value="bold">Bold</option>
                            <option value="mysterious">Mysterious</option>
                        </select>
                    </div>
                    <div class="section">
                        <label for="flirtyTarget">Target</label>
                        <select id="flirtyTarget">
                            <option value="crush" selected>Crush</option>
                            <option value="partner">Partner (playful)</option>
                            <option value="date">First Date</option>
                            <option value="stranger">Stranger (DM)</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Anniversary Mode -->
            <div id="anniversaryMode" class="hidden">
                <div class="row">
                    <div class="section">
                        <label for="years">Years Together</label>
                        <input type="number" id="years" min="1" max="50" value="1">
                    </div>
                    <div class="section">
                        <label for="anniversaryPartner">Partner's Name</label>
                        <input type="text" id="anniversaryPartner" placeholder="e.g., Alex, my wife, my husband">
                    </div>
                </div>
                <div class="section">
                    <label for="memory">Special Memory (optional)</label>
                    <input type="text" id="memory" placeholder="e.g., our first date, our wedding day, that trip to Paris...">
                </div>
            </div>

            <button class="btn" onclick="generateLove()">💖 Generate Message</button>
            <button class="btn btn-secondary" onclick="startOver()">Reset</button>
        </div>

        <div id="loading" class="hidden message">
            <p>Tapping into the love muse...</p>
        </div>

        <div id="results" class="results hidden">
            <div class="message-card" id="messageCard"></div>
        </div>
    </div>

    <script>
        const API_URL = '/api/2026-02-14-ai-love-message-generator';
        let currentMode = 'romantic';

        function setMode(mode) {
            currentMode = mode;
            document.getElementById('romanticMode').classList.add('hidden');
            document.getElementById('flirtyMode').classList.add('hidden');
            document.getElementById('anniversaryMode').classList.add('hidden');

            document.querySelectorAll('.mode-tab').forEach(tab => tab.classList.remove('active'));
            document.getElementById(`tab${mode.charAt(0).toUpperCase() + mode.slice(1)}`).classList.add('active');

            if (mode === 'romantic') {
                document.getElementById('romanticMode').classList.remove('hidden');
            } else if (mode === 'flirty') {
                document.getElementById('flirtyMode').classList.remove('hidden');
            } else if (mode === 'anniversary') {
                document.getElementById('anniversaryMode').classList.remove('hidden');
            }
        }

        async function generateLove() {
            let request;

            if (currentMode === 'romantic') {
                request = {
                    action: 'romantic',
                    recipient_name: document.getElementById('recipient').value.trim(),
                    relationship_stage: document.getElementById('stage').value,
                    length: document.getElementById('length').value
                };
            } else if (currentMode === 'flirty') {
                request = {
                    action: 'flirty',
                    style: document.getElementById('flirtyStyle').value,
                    target: document.getElementById('flirtyTarget').value
                };
            } else if (currentMode === 'anniversary') {
                const years = document.getElementById('years').value;
                if (!years || years < 1) {
                    alert('Please enter valid years together.');
                    return;
                }
                request = {
                    action: 'anniversary',
                    years: parseInt(years),
                    partner_name: document.getElementById('anniversaryPartner').value.trim(),
                    memory_shared: document.getElementById('memory').value.trim()
                };
            }

            document.querySelector('.control-panel').style.opacity = '0.6';
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('results').classList.add('hidden');

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(request)
                });
                const result = await response.json();

                displayLove(result, currentMode);
            } catch (error) {
                console.error(error);
                alert('Network error. Please try again.');
            }

            document.getElementById('loading').classList.add('hidden');
            document.querySelector('.control-panel').style.opacity = '1';
        }

        function displayLove(result, mode) {
            document.getElementById('results').classList.remove('hidden');
            const card = document.getElementById('messageCard');

            if (mode === 'romantic') {
                const msg = result.message;
                card.innerHTML = `
                    <div class="meta-badges">
                        <span class="badge">${msg.relationship_stage} love</span>
                        <span class="badge secondary">${msg.use_case}</span>
                    </div>
                    <div class="love-message">${msg.message}</div>
                    <div class="metrics-grid">
                        <div class="metric">
                            <div class="metric-label">Romance Level</div>
                            <div class="metric-value">${msg.sentiment_level}/10</div>
                        </div>
                        <div class="metric">
                            <div class="metric-label">Words</div>
                            <div class="metric-value">${msg.message.split(' ').length}</div>
                        </div>
                    </div>
                    <div class="poetic-bar">
                        <div class="poetic-title">✨ Poetic Elements Used</div>
                        <ul class="poetic-list">
                            ${msg.poetic_elements.map(e => `<li>${e}</li>`).join('')}
                        </ul>
                    </div>
                    <div class="tip-box">
                        <div class="tip-title">💡 Delivery Tip</div>
                        <div class="tip-content">${msg.delivery_tip}</div>
                    </div>
                `;

            } else if (mode === 'flirty') {
                const flirty = result.flirty;
                card.innerHTML = `
                    <div class="meta-badges">
                        <span class="badge">${flirty.style} style</span>
                        <span class="badge secondary">For a ${flirty.target}</span>
                        <span class="badge">Flirt Level: ${flirty.flirt_level}/10</span>
                    </div>
                    <div class="love-message" style="font-size:1.8rem;">${flirty.message}</div>
                    ${flirty.pickup_line_vibes ? '<div style="text-align:center;color:#888;margin-bottom:10px;"><em>😉 Has pickup line energy</em></div>' : ''}
                    <div class="metrics-grid">
                        <div class="metric">
                            <div class="metric-label">Boldness</div>
                            <div class="metric-value">${flirty.flirt_level}/10</div>
                        </div>
                        <div class="metric">
                            <div class="metric-label">Ideal Setting</div>
                            <div class="metric-value" style="font-size:1rem;">${flirty.ideal_setting}</div>
                        </div>
                    </div>
                    <div class="response-hint">
                        <strong>🤔 Expected response type:</strong> ${flirty.response_hint}
                    </div>
                `;

            } else if (mode === 'anniversary') {
                const anni = result.anniversary;
                card.innerHTML = `
                    <div class="anniversary-years">${anni.years} ${anni.years === 1 ? 'Year' : 'Years'}</div>
                    <div class="meta-badges">
                        <span class="badge">Happy Anniversary 💝</span>
                        <span class="badge secondary">${anni.partner}</span>
                    </div>
                    <div class="love-message">${anni.message}</div>
                    <div class="metrics-grid">
                        <div class="metric">
                            <div class="metric-label">Nostalgia</div>
                            <div class="metric-value">${anni.nostalgia_level}/10</div>
                        </div>
                        <div class="metric">
                            <div class="metric-label">Memory</div>
                            <div class="metric-value" style="font-size:0.9rem;">${anni.memory_mentioned || 'General celebration'}</div>
                        </div>
                    </div>
                    <div class="tip-box">
                        <div class="tip-title">💝 Romantic Gesture Suggestion</div>
                        <div class="tip-content">${anni.romantic_gesture_suggestion}</div>
                    </div>
                `;
            }
        }

        function startOver() {
            document.getElementById('results').classList.add('hidden');
            document.getElementById('recipient').value = '';
            document.getElementById('memory').value = '';
            document.getElementById('anniversaryPartner').value = '';
            document.getElementById('years').value = '1';
        }
    </script>
</body>
</html>
